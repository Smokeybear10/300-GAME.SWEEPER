class GameUI{
  constructor(){
    this.game=new Game();
    this.root=document.getElementById('game-root');
    this.container=document.getElementById('game-container');
    this.wrapper=document.getElementById('game-wrapper');
    this.timerInterval=null;this.comboCount=0;this.lastRevealTime=0;
    this.dangerFlavorShown=false;
    this._cheats={mines:false,invincible:false,infTime:false};
    this._bindExeChrome();
    this._bindCheatCodes();
    this._runBootSequence(()=>this.showStart());
  }

  _bindCheatCodes(){
    document.addEventListener('keydown',e=>{
      if(localStorage.getItem('sweeper_cheatsUnlocked')!=='1')return;
      if(!e.ctrlKey&&!e.metaKey)return;
      const k=e.key.toLowerCase();
      if(k==='m'){e.preventDefault();
        this._cheats.mines=!this._cheats.mines;
        this.showToast(this._cheats.mines?'MINES VISIBLE':'MINES HIDDEN','#888');
        this.renderBoard();
      }else if(k==='i'){e.preventDefault();
        this._cheats.invincible=!this._cheats.invincible;
        this.showToast(this._cheats.invincible?'INVINCIBLE ON':'INVINCIBLE OFF','#888');
      }else if(k==='t'){e.preventDefault();
        this._cheats.infTime=!this._cheats.infTime;
        if(this._cheats.infTime)this.game.timeRemaining=9999;
        this.showToast(this._cheats.infTime?'INFINITE TIME':'NORMAL TIME','#888');
        this.renderBoard();
      }else if(k==='s'){e.preventDefault();
        this.game.awardShards(100);
        this.showToast('+100 KEYS','#888');
        this.renderBoard();
      }else if(k==='w'){e.preventDefault();
        if(!this.timerInterval||this.game.gameOver)return;
        if(this.game.level>=this.game.totalDepths-1)return;
        this.stopTimer();
        this.game.gameWon=true;this.game.gameOver=true;
        this.showLevelComplete();
      }
    });
  }

  // Boot-up BIOS POST + Win98 splash inside the CRT screen
  _runBootSequence(done){
    // Render the computer first so .exe-wrap exists
    done();
    const wrap=this.root.querySelector('.exe-wrap');
    if(!wrap)return;
    wrap.classList.add('booting');
    sfx.init&&sfx.init();sfx.bootBeep();
    const boot=document.createElement('div');
    boot.className='exe-boot';
    boot.innerHTML=`
      <div id="exe-boot-text"></div>
      <div class="exe-boot-splash" id="exe-boot-splash">
        <div class="exe-boot-splash-logo">SWEEPER</div>
        <div class="exe-boot-splash-sub">SMOKEY INTERACTIVE &middot; 1997</div>
        <div class="exe-boot-splash-bar"><div class="exe-boot-splash-bar-fill"></div></div>
      </div>`;
    wrap.appendChild(boot);
    const lines=[
      {t:'<span class="exe-boot-brand">BLITZ NECROTRON BIOS v2.04.1997</span>',d:0},
      {t:'Copyright (C) 1994-1997 Blitz Interactive.',d:60},
      {t:'',d:100},
      {t:'CPU: NECROTRON-486DX @ 66MHz',d:140},
      {t:'Memory Test: 65024K &nbsp;',d:200},
      {t:'  Checking extended... <span class="exe-boot-ok">[ OK ]</span>',d:180},
      {t:'',d:80},
      {t:'Detecting IDE drives...',d:250},
      {t:'  Primary Master: BLITZ HDD 540MB &nbsp;<span class="exe-boot-ok">[ OK ]</span>',d:150},
      {t:'  Primary Slave: None',d:80},
      {t:'Detecting PS/2 Mouse... &nbsp;<span class="exe-boot-ok">[ OK ]</span>',d:180},
      {t:'Detecting Sound Blaster...',d:200},
      {t:'  Port 220h IRQ 5 DMA 1 &nbsp;<span class="exe-boot-ok">[ OK ]</span>',d:150},
      {t:'',d:100},
      {t:'Starting MS-DOS...',d:250},
      {t:'HIMEM is testing extended memory... done.',d:200},
      {t:'',d:80},
      {t:'C:\\>SWEEPER.EXE',d:180},
      {t:'Loading SWEEPER.EXE from \\\\LEVEL\\SYS\\...',d:220},
      {t:`Session <span class="exe-boot-brand">${String(parseInt(localStorage.getItem('sweeper_sessions')||'47',10)).padStart(5,'0')}</span> &nbsp;<span class="exe-boot-warn">[ TRIAL EXPIRED ]</span>`,d:150},
      {t:'Continuing without license...',d:200},
    ];
    const host=boot.querySelector('#exe-boot-text');
    let i=0;
    const step=()=>{
      if(i>=lines.length){
        setTimeout(()=>{
          const splash=boot.querySelector('#exe-boot-splash');
          if(splash){splash.classList.add('show');sfx.startupChime();}
          setTimeout(()=>{
            boot.classList.add('gone');
            setTimeout(()=>{boot.remove();wrap.classList.remove('booting');},500);
          },1800);
        },300);
        return;
      }
      const ln=lines[i++];
      const div=document.createElement('div');
      div.className='exe-boot-line';div.innerHTML=ln.t||'&nbsp;';

  _doRestart(){
    const wrap=this.root.querySelector('.exe-wrap');
    if(!wrap)return;
    sfx.shutdown();
    // Shutdown overlay
    const shutdown=document.createElement('div');

  // Open any app — shows a Win98 loading dialog then calls the matching show method
  _openApp(view){
    const APP_MAP={sweeper:'sweeper',lore:'lore',mycomp:'mycomp',recycle:'recycle',terminal:'terminal'};
    const winId=APP_MAP[view]||view;
    const LABELS={sweeper:'SWEEPER.EXE',lore:'LORE.HLP',mycomp:'My Computer',recycle:'Recycle Bin',terminal:'TERMINAL'};
    const SHOW={sweeper:()=>this.showStart(),lore:()=>this.showCodex(),mycomp:()=>this.showMyComputer(),recycle:()=>this.showRecycleBin(),terminal:()=>this.showTerminal()};
    if(this.root.querySelector(`#exe-win-${winId}`)){this._raiseWin(winId);return;}
    const wrap=this.root.querySelector('.exe-wrap');
    if(!wrap||wrap.querySelector('.exe-app-loader')){
      document.body.classList.remove('exe-closed');
      (SHOW[view]||SHOW.sweeper)();return;
    }
    const label=LABELS[view]||view;
    const SPEEDS={sweeper:1500,mycomp:1500,lore:900,recycle:700,terminal:700};
    const speed=SPEEDS[view]||1000;
    const loader=document.createElement('div');
    loader.className='exe-app-loader';
    loader.innerHTML=`
      <div class="exe-app-loader-box">
        <div class="exe-app-loader-title">Opening...</div>
        <div class="exe-app-loader-body">
          <div class="exe-app-loader-text">Opening ${label}...</div>
          <div class="exe-app-loader-bar"><div class="exe-app-loader-bar-fill" style="animation-duration:${speed/1000}s;"></div></div>
        </div>
      </div>`;
    wrap.appendChild(loader);
    setTimeout(()=>{
      loader.classList.add('gone');
      setTimeout(()=>{
        loader.remove();
        document.body.classList.remove('exe-closed');
        (SHOW[view]||SHOW.sweeper)();
      },250);
    },speed);
  }

  // VHS timestamp — frozen date, clock ticks slowly
  _startVHSClock(){
    if(this._vhsInterval)return;
    this._vhsTicks=0;
    const fakeDate='JAN 15 1998';
    const baseH=3,baseM=47,baseS=22;
    this._vhsInterval=setInterval(()=>{
      this._vhsTicks++;
      const totalSec=baseS+Math.floor(this._vhsTicks/2);
      const s=totalSec%60;
      const m=(baseM+Math.floor(totalSec/60))%60;
      const h=(baseH+Math.floor((baseM+Math.floor(totalSec/60))/60))%12||12;
      const tsEl=document.getElementById('vhs-ts');
      if(tsEl)tsEl.textContent=`${fakeDate}  ${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')} AM`;
      const clockEl=document.getElementById('exe-clock');
      if(clockEl)clockEl.textContent=`${h}:${String(m).padStart(2,'0')} AM`;
    },500);
    // Sound button in taskbar
    this._bindTaskbarSound();
  }

  _bindTaskbarSound(){
    const wrap=this.root.querySelector('.exe-wrap');
    if(!wrap)return;
    wrap.addEventListener('click',e=>{
      const btn=e.target.closest('#exe-sound-btn');
      if(!btn)return;
      sfx.init();sfx.toggle();
      btn.classList.toggle('muted',sfx.muted);
      btn.textContent=sfx.muted?'\u00D7':'\u266B';
    });
  }

  // Keep taskbar app buttons in sync with open windows — clicking raises that window
  _syncTaskbarApps(){
    const bar=document.getElementById('exe-taskbar-apps');
    if(!bar)return;
    const LABELS={sweeper:'SWEEPER.EXE',lore:'LORE.HLP',mycomp:'My Computer',recycle:'Recycle Bin',sysalert:'System Alert',terminal:'TERMINAL'};
    const ICONS={sweeper:'S',lore:'?',mycomp:'PC',recycle:'\u2718',sysalert:'!',terminal:'>_'};
    const wins=this.root.querySelectorAll('.exe-win');
    const apps=[];
    wins.forEach(w=>{
      const id=w.dataset.winId;
      const label=LABELS[id]||(id.startsWith('note-')?(w.dataset.noteLabel||'Notepad'):id);
      const ic=ICONS[id]||(id.startsWith('note-')?'\u{1F4DD}':'');
      const isActive=!w.classList.contains('exe-inactive');
      apps.push(`<div class="exe-taskbar-app ${isActive?'active':''}" data-taskbar-win="${id}"><span class="tapp-ic">${ic}</span>${label}</div>`);
    });
    bar.innerHTML=apps.join('');

  // Render (or update) a named window with innerHTML. Creates if missing, raises to top.
  _renderWin(winId,innerHTML){
    this._ensureShell();
    const wrap=this.root.querySelector('.exe-wrap');
    let win=wrap.querySelector(`#exe-win-${winId}`);
    const isNew=!win;
    if(isNew){
      win=document.createElement('div');
      win.className='exe-win';
      win.id=`exe-win-${winId}`;
      win.dataset.winId=winId;
      wrap.appendChild(win);
    }
    win.innerHTML=innerHTML;
    this._applyWinPosition(winId);
    this._raiseWin(winId);
    this._syncClosedState();
    this._syncTaskbarApps();
    if(isNew)sfx.winOpen();
    return win;
  }

  // Bring a window to the front by assigning it the highest z-index
  _raiseWin(winId){
    this._zCounter=(this._zCounter||10)+1;
    // Reset counter to prevent z-index from exceeding CRT overlay layers (z-100+)
    if(this._zCounter>80){
      this._zCounter=10;
      this.root.querySelectorAll('.exe-win').forEach(w=>{w.style.zIndex=10;});
    }
    const win=this.root.querySelector(`#exe-win-${winId}`);
    if(!win)return;
    win.style.zIndex=this._zCounter;
    this.root.querySelectorAll('.exe-win').forEach(w=>{
      w.classList.toggle('exe-inactive',w!==win);
    });
  }

  // Remove a window from the DOM
  _closeWin(winId){
    const win=this.root.querySelector(`#exe-win-${winId}`);
    if(win){win.remove();sfx.winClose();}
    // If SWEEPER closed during game, stop the timer
    if(winId==='sweeper')this.stopTimer();
    this._syncClosedState();
    this._syncTaskbarApps();
  }

  // Keep body.exe-closed in sync with whether any window is open
  _syncClosedState(){
    const hasAny=!!this.root.querySelector('.exe-win');
    document.body.classList.toggle('exe-closed',!hasAny);
  }

  // Delegated handlers for the Win98 chrome — survives innerHTML rerenders.
  _bindExeChrome(){
    // Drag state
    let drag=null;

    const onDown=e=>{
      if(!document.body.classList.contains('exe-mode'))return;
      // Titlebar drag has priority (it contains buttons we want to ignore)
      const tbar=e.target.closest('.exe-titlebar');
      const btn=e.target.closest('.exe-tbtn');
      let el=null,kind=null,id=null;
      if(tbar&&!btn){
        const win=tbar.closest('.exe-win');
        if(win&&win.closest('.exe-wrap')&&win.dataset.winId){
          el=win;kind='win';id=win.dataset.winId;
          this._raiseWin(id);
          this._syncTaskbarApps();
        }
      }
      if(!el){
        const icon=e.target.closest('.exe-desk-icon');
        if(icon){el=icon;kind='icon';id=icon.dataset.icon;}
      }
      if(!el)return;
      const touch=e.touches&&e.touches[0];
      const cx=touch?touch.clientX:e.clientX;
      const cy=touch?touch.clientY:e.clientY;
      const parent=el.offsetParent||el.parentElement;
      const pr=parent.getBoundingClientRect();
      const ir=el.getBoundingClientRect();
      const ps=getComputedStyle(parent);
      const bl=parseFloat(ps.borderLeftWidth)||0;
      const bt=parseFloat(ps.borderTopWidth)||0;
      // Measure from visual rect so transforms resolve correctly
      const origX=ir.left-pr.left-bl;
      const origY=ir.top-pr.top-bt;
      drag={el,kind,id,startX:cx,startY:cy,origX,origY,moved:false,pw:parent.clientWidth,ph:parent.clientHeight,w:ir.width,h:ir.height};
      if(touch)e.preventDefault();
    };
    const onMove=e=>{
      if(!drag)return;
      const touch=e.touches&&e.touches[0];
      const cx=touch?touch.clientX:e.clientX;
      const cy=touch?touch.clientY:e.clientY;
      const dx=cx-drag.startX,dy=cy-drag.startY;
      if(!drag.moved&&(Math.abs(dx)>4||Math.abs(dy)>4))drag.moved=true;
      if(drag.moved){
        const nx=Math.max(0,Math.min(drag.pw-drag.w,drag.origX+dx));
        const ny=Math.max(0,Math.min(drag.ph-drag.h,drag.origY+dy));
        drag.el.style.left=nx+'px';drag.el.style.top=ny+'px';
        drag.el.style.right='auto';drag.el.style.bottom='auto';drag.el.style.transform='none';
        drag.lastX=nx;drag.lastY=ny;
        if(touch)e.preventDefault();
      }
    };
    const onUp=()=>{
      if(!drag)return;
      if(drag.moved){
        if(drag.kind==='win'){
          this._winPos=this._winPos||{};
          this._winPos[drag.id]={x:drag.lastX,y:drag.lastY};
          this._saveWinPos();
        }else{
          this._iconPositions=this._iconPositions||{};
          this._iconPositions[drag.id]={x:drag.lastX,y:drag.lastY};
          this._saveIconPositions();
          drag.el._wasDragged=true;
          setTimeout(()=>{if(drag.el)drag.el._wasDragged=false;},120);
        }
      }
      drag=null;
    };

    document.addEventListener('mousedown',onDown);
    document.addEventListener('mousemove',onMove);
    document.addEventListener('mouseup',onUp);
    document.addEventListener('touchstart',onDown,{passive:false});
    document.addEventListener('touchmove',onMove,{passive:false});
    document.addEventListener('touchend',onUp);

    // Click handler (capture phase to intercept drag-clicks)
    document.addEventListener('click',e=>{
      if(!document.body.classList.contains('exe-mode'))return;
      const icon=e.target.closest('.exe-desk-icon');
      if(icon&&icon._wasDragged){e.preventDefault();e.stopPropagation();return;}
      // Reload button → brief overlay then reopen instantly (no loader)
      if(e.target.closest('.exe-reload-btn')){
        e.preventDefault();e.stopPropagation();
        const win=e.target.closest('.exe-win');
        if(win&&win.dataset.winId&&!win.querySelector('.exe-reload-overlay')){
          const winId=win.dataset.winId;
          const ov=document.createElement('div');
          ov.className='exe-reload-overlay';
          ov.innerHTML='<div class="exe-reload-msg">Reloading...</div>';
          win.appendChild(ov);
          const SHOW={sweeper:()=>this.showStart(),lore:()=>this.showCodex(),mycomp:()=>this.showMyComputer(),recycle:()=>this.showRecycleBin(),terminal:()=>this.showTerminal()};
          setTimeout(()=>{
            this._closeWin(winId);
            document.body.classList.remove('exe-closed');
            (SHOW[winId]||SHOW.sweeper)();
          },600);
        }
        return;
      }
      // Close button → close only that specific window
      if(e.target.closest('.exe-close-btn')){
        e.preventDefault();e.stopPropagation();
        const win=e.target.closest('.exe-win');
        if(win&&win.dataset.winId){
          sfx.init&&sfx.init();
          if(win.dataset.winId==='sysalert'){this._dismissSysAlert();}
          else{this._closeWin(win.dataset.winId);}
        }
        return;
      }
      // SWEEPER.EXE icon → raise existing window or open with loading delay
      if(e.target.closest('#exe-desk-sweeper')){
        e.preventDefault();e.stopPropagation();
        sfx.init&&sfx.init();
        if(this.root.querySelector('#exe-win-sweeper'))this._raiseWin('sweeper');
        else this._openApp('sweeper');
        return;
      }
      // LORE.HLP icon
      if(e.target.closest('#exe-desk-lore')){
        e.preventDefault();e.stopPropagation();
        sfx.init&&sfx.init();
        if(this.root.querySelector('#exe-win-lore'))this._raiseWin('lore');
        else this._openApp('lore');
        return;
      }
      // My Computer icon
      if(e.target.closest('#exe-desk-mycomp')){
        e.preventDefault();e.stopPropagation();
        sfx.init&&sfx.init();
        if(this.root.querySelector('#exe-win-mycomp'))this._raiseWin('mycomp');
        else this._openApp('mycomp');
        return;
      }
      // Recycle Bin icon
      if(e.target.closest('#exe-desk-recycle')){
        e.preventDefault();e.stopPropagation();
        sfx.init&&sfx.init();
        if(this.root.querySelector('#exe-win-recycle'))this._raiseWin('recycle');
        else this._openApp('recycle');
        return;
      }
      if(e.target.closest('#exe-desk-terminal')){
        e.preventDefault();e.stopPropagation();
        sfx.init&&sfx.init();
        if(this.root.querySelector('#exe-win-terminal'))this._raiseWin('terminal');
        else this._openApp('terminal');
        return;
      }
      // Start button — sluggish like a real 486
      if(e.target.closest('#exe-start-btn')){
        e.preventDefault();e.stopPropagation();
        const menu=this.root.querySelector('#exe-start-menu');
        const btn=this.root.querySelector('#exe-start-btn');
        if(menu.classList.contains('open')){
          menu.classList.remove('open');btn.classList.remove('open');
        }else{
          btn.classList.add('open');sfx.menuOpen();
          setTimeout(()=>menu.classList.add('open'),300);
        }
        return;
      }
      // Start menu items
      const startItem=e.target.closest('[data-start-action]');
      if(startItem){
        e.preventDefault();e.stopPropagation();
        this.root.querySelector('#exe-start-menu').classList.remove('open');
        this.root.querySelector('#exe-start-btn').classList.remove('open');
        const action=startItem.dataset.startAction;
        if(action==='restart'||action==='shutdown')this._doRestart();
        return;
      }
      // Close start menu on any other click
      const startMenu=this.root.querySelector('#exe-start-menu');
      if(startMenu&&startMenu.classList.contains('open')){
        startMenu.classList.remove('open');
        this.root.querySelector('#exe-start-btn').classList.remove('open');
      }
      if(e.target.closest('#exe-desk-about')){
        e.preventDefault();e.stopPropagation();
        sfx.init&&sfx.init();
        document.body.classList.remove('exe-closed');
        this.showNotepad('AUTHOR.TXT','SWEEPER.EXE v4.0.1\nby Thomas Ou\n\n─────────────────────────\n\nWeb:      thomasou.com\nGitHub:   github.com/Smokeybear10\nLinkedIn: linkedin.com/in/thomasou0\n\n─────────────────────────\n\nLook in project files for help...\nSome answers are hidden in plain sight.');
        return;
      }
      // Taskbar app button — raise or reopen that window
      const taskBtn=e.target.closest('[data-taskbar-win]');
      if(taskBtn){
        e.preventDefault();e.stopPropagation();
        const winId=taskBtn.dataset.taskbarWin;
        if(this.root.querySelector(`#exe-win-${winId}`)){
          this._raiseWin(winId);
          this._syncTaskbarApps();
        }
        return;
      }
      // Clicking anywhere on a window raises it to the front
      const winHit=e.target.closest('.exe-win');
      if(winHit&&winHit.dataset.winId&&winHit.classList.contains('exe-inactive')){
        this._raiseWin(winHit.dataset.winId);
        this._syncTaskbarApps();
      }
    },true);
  }

  showSystemAlert(sessionStr){
    if(!sessionStr){
      const sessions=parseInt(localStorage.getItem('sweeper_sessions')||'47',10);
      sessionStr=String(sessions).padStart(5,'0');
    }

  _dismissSysAlert(){
    const wasFirst=!this._modalDismissed;
    this._modalDismissed=true;
    this._closeWin('sysalert');
    const msg=document.querySelector('#exe-win-sweeper #exe-sb-msg');
    if(msg)msg.innerHTML='<span class="exe-dot"></span>READY';
    if(wasFirst)this._openApp('lore');
  }

  showMyComputer(path){
    path=path||'C:\\';
    const fs=this._FS();
    const items=fs[path]||[];
    const filesHTML=items.map((f,i)=>{
      const ico=f.icon.length<=2?`<span class="exe-fi" style="font-size:11px;">${f.icon}</span>`:`<span class="exe-fi">${f.icon}</span>`;
      return `<div class="exe-list-item" data-fs-idx="${i}" data-fs-type="${f.type}" data-fs-path="${f.path||''}">${ico}<span class="exe-name">${f.name}</span><span class="exe-size">${f.size}</span></div>`;
    }).join('');
    const winHTML=`
    <div class="exe-titlebar">
      <div class="exe-ttext"><span class="exe-ic">PC</span>${path==='C:\\'?'My Computer':path}</div>
      <div class="exe-tbtns"><button class="exe-tbtn exe-reload-btn" title="Reload">&#x21BB;</button><button class="exe-tbtn exe-close-btn" title="Close">&times;</button></div>
    </div>
    <div class="exe-client" style="padding:0;">
      <div style="background:#EAEAEA;padding:3px 8px;font-size:10px;font-weight:700;border-bottom:1px solid #6E6E6E;font-family:'Tahoma',sans-serif;color:#000;">
        Address: <span style="font-weight:400;font-family:'JetBrains Mono',monospace;font-size:10px;">${path}</span>
      </div>
      <div class="exe-listbox" style="min-height:200px;max-height:300px;overflow-y:auto;" id="mc-files">${filesHTML}</div>
    </div>
    <div class="exe-status">
      <div class="exe-sb-cell">${items.filter(f=>f.type!=='up').length} object(s)</div>
      <div class="exe-sb-cell">(C:) Local Disk</div>
    </div>`;
    const win=this._renderWin('mycomp',winHTML);
    win.querySelector('#mc-files').addEventListener('click',e=>{
      const row=e.target.closest('.exe-list-item');if(!row)return;
      const type=row.dataset.fsType;
      const idx=parseInt(row.dataset.fsIdx,10);
      const f=items[idx];if(!f)return;
      if(type==='up'){this.showMyComputer(f.path);return;}
      if(type==='folder'){
        const sub=path.endsWith('\\')?path+f.name:path+'\\'+f.name;
        if(fs[sub])this.showMyComputer(sub);
        return;
      }
      // Clickable apps — open the real thing
      const nm=f.name.toUpperCase();
      if(nm==='SWEEPER.EXE'||type==='shortcut'&&nm==='SWEEPER.EXE'){this._openApp('sweeper');return;}
      if(nm==='LORE.HLP'||type==='shortcut'&&nm==='LORE.HLP'){this._openApp('lore');return;}
      if(type==='save'){this._loadSaveFile(f.name);return;}
      if(f.content)this.showNotepad(f.name,f.content);
    });
  }

  showNotepad(filename,content){
    // Each notepad gets a unique window id so you can open several
    const winId='note-'+filename.replace(/[^a-zA-Z0-9]/g,'').toLowerCase();
    // If already open, just raise
    if(this.root.querySelector(`#exe-win-${winId}`)){this._raiseWin(winId);return;}
    const escaped=content.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    const winHTML=`
    <div class="exe-titlebar">
      <div class="exe-ttext"><span class="exe-ic" style="font-size:8px;">\u{1F4DD}</span>${filename} - Notepad</div>
      <div class="exe-tbtns"><button class="exe-tbtn exe-close-btn" title="Close">&times;</button></div>
    </div>
    <div style="background:#FFF;border:1px solid #000;box-shadow:inset 1px 1px 0 #404040,inset -1px -1px 0 #EFEFEF;padding:8px 10px;min-height:120px;max-height:260px;overflow-y:auto;font-family:'JetBrains Mono',monospace;font-size:11px;color:#000;white-space:pre-wrap;line-height:1.55;">${escaped}</div>`;
    const win=this._renderWin(winId,winHTML);
    win.dataset.noteLabel=filename;
  }

  showTerminal(){
    const winHTML=`
    <div class="exe-titlebar">
      <div class="exe-ttext"><span class="exe-ic" style="font-size:9px;">&gt;_</span>TERMINAL</div>
      <div class="exe-tbtns"><button class="exe-tbtn exe-reload-btn" title="Reload">&#x21BB;</button><button class="exe-tbtn exe-close-btn" title="Close">&times;</button></div>
    </div>
    <div class="term-body" id="term-output">
      <div class="term-line">SWEEPER Terminal v4.0.1</div>
      <div class="term-line">Copyright (C) 1997 Smokey Interactive.</div>
      <div class="term-line">&nbsp;</div>
      <div class="term-line">Type <span class="term-info">HELP</span> for a list of commands.</div>
      <div class="term-line">&nbsp;</div>
    </div>
    <div class="term-input-row">
      <span class="term-prompt">C:\\&gt;</span>
      <input class="term-input" id="term-input" type="text" spellcheck="false" autocomplete="off" autofocus>
    </div>
    <div class="exe-status"><div class="exe-sb-cell">TERMINAL &mdash; ready</div></div>`;
    const win=this._renderWin('terminal',winHTML);
    const input=win.querySelector('#term-input');
    const output=win.querySelector('#term-output');
    input.focus();
    const self=this;
    const COMMANDS={
      help:()=>'<span class="term-info">Available commands:</span>\n  HELP        Show this list\n  CLEAR       Clear terminal\n  VER         Show version\n  DIR         List files\n  STATUS      Show game state\n  ECHO [msg]  Echo a message\n  RESTART     Restart the system\n\n<span class="term-warn">Some inputs are not commands.</span>',
      restart:()=>{setTimeout(()=>self._doRestart(),500);return'<span class="term-warn">Restarting system...</span>';},
      clear:()=>{output.innerHTML='';return null;},
      ver:()=>'SWEEPER.EXE v4.0.1\nBLITZ NECROTRON BIOS v2.04.1997\nSession '+String(parseInt(localStorage.getItem('sweeper_sessions')||'47',10)).padStart(5,'0'),
      dir:()=>'C:\\PROGRAM FILES\\SWEEPER\n\n  SWEEPER.EXE    248 KB\n  LORE.HLP        12 KB\n  genesis.dll     12 KB\n  solomon.dll     28 KB\n  lazarus.dll     20 KB\n  samson.dll      36 KB\n  eden.dll        44 KB\n  manna.dll       52 KB\n  ????????.dll     0 KB\n\n  8 file(s)',
      status:()=>{
        const g=self.game;
        return`  Module:  ${classById(g.gameClass).name}\n  Level:   ${g.level+1}/${g.totalDepths}\n  Keys:    ${g.shards}\n  Hard:    ${g.hardMode?'YES':'NO'}`;
      },
      echo:(args)=>args||'',
    };
    const SECRETS={
      'APPLE':()=>{
        if(localStorage.getItem('sweeper_hardUnlocked')==='1')return'<span class="term-warn">ROOT.ACCESS is already active.</span>';
        localStorage.setItem('sweeper_hardUnlocked','1');
        return'<span class="term-ok">Authenticating...</span>\n<span class="term-ok">ROOT.ACCESS granted.</span>\n\n<span class="term-info">Deeper partitions now accessible.</span>\n<span class="term-info">Five levels. Modifiers active. No mercy.</span>\n\n<span class="term-warn">Restart SWEEPER.EXE to apply.</span>';
      },
      'SNAKE':()=>{
        if(localStorage.getItem('sweeper_cheatsUnlocked')==='1')return'<span class="term-warn">Dev mode is already active.</span>';
        localStorage.setItem('sweeper_cheatsUnlocked','1');
        return'<span class="term-ok">Dev mode enabled.</span>\n\n<span class="term-info">Cheat codes are now active.</span>\n<span class="term-info">See CHEATS.TXT for key bindings.</span>';
      },
    };
    input.addEventListener('keydown',e=>{
      if(e.key!=='Enter')return;
      const raw=input.value.trim();input.value='';
      if(!raw)return;
      const parts=raw.split(/\s+/);
      const cmd=parts[0].toLowerCase();
      const args=parts.slice(1).join(' ');
      const echo=document.createElement('div');
      echo.className='term-line';echo.innerHTML='<span class="term-ok">C:\\&gt;</span> '+raw.replace(/</g,'&lt;');
      output.appendChild(echo);
      const secret=SECRETS[raw.trim().toUpperCase()];
      if(secret){
        const out=document.createElement('div');
        out.className='term-line';out.innerHTML=secret();
        output.appendChild(out);
      }else{
        const handler=COMMANDS[cmd];
        if(handler){
          const result=handler(args);
          if(result!==null&&result!==undefined){
            const out=document.createElement('div');
            out.className='term-line';out.innerHTML=result;
            output.appendChild(out);
          }
        }else{
          const out=document.createElement('div');
          out.className='term-line';out.innerHTML='<span class="term-err">Bad command or file name: '+cmd+'</span>';
          output.appendChild(out);
        }
      }
      const spacer=document.createElement('div');
      spacer.className='term-line';spacer.innerHTML='&nbsp;';
      output.appendChild(spacer);
      output.scrollTop=output.scrollHeight;
    });
    win.addEventListener('click',()=>input.focus());
  }

  startLevel(){
    this.stopTimer();this.dangerFlavorShown=false;
    this.levelStartTime=Date.now();
    const line=NARRATOR.react('startLevel',{level:this.game.level});
    if(line)this.setFlavor(line);
    this.renderBoard();this.startTimer();
  }

  renderBoard(){
    const g=this.game;
    const maxW=Math.min(window.innerWidth*0.92,520);
    const chromeH=240;
    const wrapEl=this.root.querySelector('.exe-wrap');
    const availH=wrapEl?wrapEl.clientHeight-chromeH:window.innerHeight-chromeH;
    const cellFromW=Math.floor((maxW-8)/g.cols);
    const cellFromH=Math.floor((availH-8)/g.rows);
    const cellSize=Math.min(cellFromW,cellFromH,34);

    let powerupsHTML='';
    if(g.powerups.length>0){
      const PMAP={timewarp:{cls:'timewarp',glyph:ICONS.time_glyph,label:'BACKUP'},shield:{cls:'shield',glyph:ICONS.shield_glyph,label:'FIREWALL'},compass:{cls:'compass',glyph:ICONS.compass_glyph,label:'SCANDISK'},oracle:{cls:'oracle',glyph:ICONS.oracle_glyph,label:'DEFRAG'},rewind:{cls:'rewind',glyph:ICONS.rewind_glyph,label:'REWIND'},lantern:{cls:'lantern',glyph:ICONS.lantern_glyph,label:'TRACERT'},hex:{cls:'cursed',glyph:ICONS.hex_glyph,label:'SPYWARE'},tithe:{cls:'cursed',glyph:ICONS.tithe_glyph,label:'TROJAN'},bargain:{cls:'cursed',glyph:ICONS.bargain_glyph,label:'ADWARE'},scapegoat:{cls:'cursed',glyph:ICONS.scapegoat_glyph,label:'BLOATWARE'},pyre:{cls:'cursed',glyph:ICONS.pyre_glyph,label:'ROOTKIT'}};
      powerupsHTML=g.powerups.map((p,i)=>{
        const m=PMAP[p]||PMAP.timewarp;
        return`<span class="powerup-badge ${m.cls}" data-powerup="${p}" data-idx="${i}">${m.label}</span>`;
      }).join('');
    }

    const timerPct=g.maxTime>0?(g.timeRemaining/g.maxTime*100):100;
    const isLow=g.timeRemaining<=15;

    const runesHTML=Array.from({length:g.totalDepths},(_,i)=>{
      const cls=i<g.level?'completed':i===g.level?'active':'';
      return`<div class="level-rune ${cls}">${ICONS.runes[i]}</div>`;
    }).join('');

    let modBarHTML='';
    const badges=[];
    if(g.modifiers.length>0)badges.push(...g.modifiers.map(m=>`<span class="modifier-badge" title="${m.desc}"><span class="mg">${m.icon}</span>${m.name}</span>`));
    if(badges.length>0)modBarHTML=`<div class="modifier-bar">${badges.join('')}</div>`;

    const depthStr=String(g.level+1).padStart(2,'0');
    const totalStr=String(g.totalDepths).padStart(2,'0');
    const sessionStr=String(parseInt(localStorage.getItem('sweeper_sessions')||'47',10)).padStart(5,'0');
    const winHTML=`
    <div class="exe-titlebar">
      <div class="exe-ttext"><span class="exe-ic">S</span>SWEEPER.EXE &middot; [RUNNING &middot; level_${depthStr} of ${totalStr}]</div>
      <div class="exe-tbtns"><button class="exe-tbtn exe-close-btn" title="Close window">&times;</button></div>
    </div>
    <div class="status-bar">
      <div class="status-item"><span class="status-label">Level</span><span class="status-value accent">${depthStr}</span></div>
      <div class="status-item"><span class="status-label">Keys</span><span class="status-value accent" id="shard-val">${g.shards}</span></div>
      <div class="status-item"><span class="status-label">Time</span><span class="status-value ${isLow?'danger-text':'accent'}" id="timer-val">${this.fmtTime(g.timeRemaining)}</span></div>
      <div class="status-item"><span class="status-label">Flags</span><span class="status-value" id="mines-val">${g.mineCount-g.flagCount}</span></div>
    </div>
    <div class="level-bar">${runesHTML}</div>
    ${modBarHTML}
    <div class="timer-bar-wrap"><div class="timer-bar ${isLow?'low':''}" id="timer-bar" style="width:${timerPct}%"></div></div>
    <div class="powerup-bar" id="powerup-bar">${powerupsHTML}</div>
    <div class="game-screen"><div class="grid" id="grid" role="grid" aria-label="Minesweeper board" style="grid-template-columns:repeat(${g.cols},${cellSize}px);gap:1px;padding:4px;"></div></div>
    <div class="controls">
      <button class="btn btn-primary" id="btn-new">New Game</button>
      <button class="btn btn-secondary" id="btn-save">Save</button>
      <button class="btn btn-secondary" id="btn-load">Load</button>
    </div>
    <div class="exe-status">
      <div class="exe-sb-cell" id="exe-sb-msg"><span class="exe-dot"></span>RUNNING</div>
      <div class="exe-sb-cell">level_${depthStr}</div>
      <div class="exe-sb-cell">session ${sessionStr}</div>
      <div class="exe-sb-cell">MEM 512K</div>
    </div>`;
    const win=this._renderWin('sweeper',winHTML);

    this.container.classList.toggle('danger',isLow&&!g.gameOver);

    const grid=win.querySelector('#grid');
    for(let r=0;r<g.rows;r++){
      for(let c=0;c<g.cols;c++){
        const cell=g.board[r][c];
        const el=document.createElement('div');
        el.style.width=cellSize+'px';el.style.height=cellSize+'px';
        el.style.fontSize=Math.max(cellSize*0.42,10)+'px';
        el.dataset.r=r;el.dataset.c=c;
        el.setAttribute('role','gridcell');
        el.tabIndex=0;
        this.applyCellClass(el,cell,r,c);
        grid.appendChild(el);
      }
    }

    grid.addEventListener('click',e=>this.handleClick(e));
    grid.addEventListener('contextmenu',e=>{e.preventDefault();this.handleRightClick(e);});
    let touchTimer=null,touchMoved=false;
    grid.addEventListener('touchstart',e=>{touchMoved=false;touchTimer=setTimeout(()=>{if(!touchMoved)this.handleRightClick(e);},400);},{passive:true});
    grid.addEventListener('touchmove',()=>{touchMoved=true;clearTimeout(touchTimer);},{passive:true});
    grid.addEventListener('touchend',()=>clearTimeout(touchTimer),{passive:true});

    win.querySelector('#btn-new').addEventListener('click',()=>{sfx.init();this.game.reset();this.startLevel();});
    win.querySelector('#btn-save').addEventListener('click',()=>this.saveGame());
    win.querySelector('#btn-load').addEventListener('click',()=>this.loadGame());
    win.querySelectorAll('.powerup-badge').forEach(el=>{el.addEventListener('click',()=>this.usePowerup(el.dataset.powerup));});
  }

  applyCellClass(el,cell,r,c){
    el.className='cell';
    const g=this.game;
    if(cell.revealed){
      if(cell.mine){
        el.classList.add('mine-hit');el.innerHTML=ICONS.skull;
        el.setAttribute('aria-label','Mine');
      }else{
        el.classList.add('revealed');
        const displayN=g.displayAdjacent(cell);
        let shown='';
        if(displayN>0){
          const isCryptic=g.hasModifier('cryptic')&&displayN>=4;
          const val=isCryptic?'?':displayN;
          const color=isCryptic?'var(--text-muted)':NUM_COLORS[displayN];
          shown=`<span class="num-display" style="color:${color};text-shadow:0 0 6px ${color}33">${val}</span>`;
        }
        el.innerHTML=shown;
        el.setAttribute('aria-label',displayN>0?displayN+' adjacent':'Empty');
        if(g.hasModifier('echo')&&displayN>0)el.classList.add('echo-fade');
      }
    }else if(cell.flagged){
      el.classList.add('flagged');el.innerHTML=ICONS.stake;
      el.setAttribute('aria-label','Flagged');
    }else{
      el.classList.add('unrevealed');
      el.innerHTML=this._cheats.mines&&cell.mine?ICONS.skull:'';
      el.setAttribute('aria-label','Unrevealed');
      if(g.hasModifier('fog')&&r!=null&&c!=null&&!g.isVisible(r,c)){
        el.classList.add('fogged');
        el.setAttribute('aria-label','Hidden in fog');
      }
    }
  }

  getCellEl(e){const el=e.target.closest('.cell');if(!el)return null;return{el,r:+el.dataset.r,c:+el.dataset.c};}

  handleClick(e){
    const t=this.getCellEl(e);if(!t||this.game.gameOver)return;
    sfx.init();
    const cell=this.game.board[t.r][t.c];
    if(this.game.hasModifier('fog')&&!cell.revealed&&!this.game.isVisible(t.r,t.c))return;
    const wasChord=cell.revealed;
    const results=wasChord?this.game.chord(t.r,t.c):this.game.reveal(t.r,t.c);
    if(!results.length)return;

    if(results[0]?.chordDisabled){
      sfx.chordFail();
      this.showToast('CHORD DISABLED','var(--danger)');
      t.el.classList.remove('chord-fail');void t.el.offsetWidth;
      t.el.classList.add('chord-fail');
      return;
    }

    if(this.game.consumeSurge())this.triggerSurge();

    if(results[0]?.shieldBlocked){
      sfx.shieldBlock();this.showToast('FIREWALL absorbed','var(--num-2)');this.setFlavor(NARRATOR.react('shieldBlock')||'');this.renderBoard();return;
    }
    if(results[0]?.scapegoatBlocked){
      sfx.shieldBlock();this.showToast('BLOATWARE absorbed / time halved +5s','var(--danger)');this.renderBoard();return;
    }
    if(results[0]?.mine){
      if(results[0]?.chordPenalty){
        sfx.chordFail();
        this.game.timeRemaining=Math.max(0,this.game.timeRemaining-1);
        this.showToast('CHORD DISABLED 3s / -1s','var(--danger)');
        const overlay=document.createElement('div');overlay.className='chord-disabled-overlay';
        document.body.appendChild(overlay);
        setTimeout(()=>overlay.remove(),700);
      }
      if(this._cheats.invincible){
        const cell=this.game.board[t.r][t.c];
        cell.revealed=false;this.game.revealedCount--;cell.mine=false;this.game.gameOver=false;
        cell.adjacent=this.game.countAdj(t.r,t.c);
        for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){const nr=t.r+dr,nc=t.c+dc;if(nr>=0&&nr<this.game.rows&&nc>=0&&nc<this.game.cols&&!this.game.board[nr][nc].mine)this.game.board[nr][nc].adjacent=this.game.countAdj(nr,nc);}
        this.showToast('BLOCKED','#888');this.renderBoard();return;
      }
      this.onMineHit(t.r,t.c);return;
    }

    wasChord?sfx.chordSuccess():sfx.reveal();
    const now=Date.now();
    const comboWindow=this.game.gameClass==='samson'?1000:800;
    if(now-this.lastRevealTime<comboWindow){
      this.comboCount++;
      if(this.comboCount>=3){
        const bonus=this.game.gameClass==='samson'?Math.min(this.comboCount-1,7):Math.min(this.comboCount-2,5);
        this.game.awardShards(bonus);this.showCombo(e.clientX,e.clientY,this.comboCount);
      }
      if(this.game.gameClass==='samson'&&this.comboCount>=5){
        this.game.timeRemaining=Math.min(this.game.timeRemaining+1,this.game.maxTime+30);
        if(this.comboCount===5||this.comboCount%3===0)this.showToast('+1s','var(--accent)');
      }
      if(this.comboCount===4||this.comboCount===7){const line=NARRATOR.react('combo',{count:this.comboCount});if(line)this.setFlavor(line);}
      // Track max combo for class unlocks
      const prevMax=parseInt(localStorage.getItem('sweeper_maxCombo')||'0',10);
      if(this.comboCount>prevMax)localStorage.setItem('sweeper_maxCombo',String(this.comboCount));
    }else{this.comboCount=1;}
    this.lastRevealTime=now;

    this.renderBoard();
    const revealClass=wasChord?'chord-reveal':'just-revealed';
    results.forEach(({r,c})=>{
      if(r==null||c==null)return;
      const idx=r*this.game.cols+c;
      const cellEl=document.getElementById('grid')?.children[idx];
      if(cellEl)cellEl.classList.add(revealClass);
    });

    if(this.game.gameWon){this.stopTimer();sfx.levelComplete();setTimeout(()=>this.showLevelComplete(),500);}
  }

  handleRightClick(e){
    const t=this.getCellEl(e);if(!t||this.game.gameOver)return;
    const cell=this.game.board[t.r][t.c];
    if(this.game.hasModifier('fog')&&!cell.revealed&&!this.game.isVisible(t.r,t.c))return;
    sfx.init();const was=cell.flagged;
    if(this.game.toggleFlag(t.r,t.c)){
      if(this.game.gameClass==='solomon'&&!was&&!this.game.firstClick){
        if(cell.mine){
          this.game.timeRemaining=Math.min(this.game.timeRemaining+3,this.game.maxTime+30);
          this.showToast('+3s','var(--accent)');sfx.flag();
        }else{
          cell.flagged=false;
          this.game.gameOver=true;this.game.gameWon=false;
          this.onMineHit(t.r,t.c);return;
        }
      }else{was?sfx.unflag():sfx.flag();}
      this.renderBoard();
    }
  }

  triggerSurge(){
    this.container.classList.remove('surge-flash');void this.container.offsetWidth;
    this.container.classList.add('surge-flash');
    this.showToast('SURGE','var(--danger)');
    sfx.explosion();
    setTimeout(()=>this.container.classList.remove('surge-flash'),900);
  }

  onMineHit(r,c){
    sfx.explosion();
    this.wrapper.classList.remove('shake');void this.wrapper.offsetWidth;
    this.wrapper.classList.add('shake');
    setTimeout(()=>this.wrapper.classList.remove('shake'),400);

    for(let row=0;row<this.game.rows;row++)
      for(let col=0;col<this.game.cols;col++)
        if(this.game.board[row][col].mine)this.game.board[row][col].revealed=true;

    this.renderBoard();
    const idx=r*this.game.cols+c;
    const hitEl=document.getElementById('grid')?.children[idx];
    if(hitEl)hitEl.classList.add('mine-hit');

    this.setFlavor(NARRATOR.react('gameOver')||'');
    this.stopTimer();
    setTimeout(()=>this.showGameOver(),900);
  }

  showCombo(x,y,count){
    const el=document.createElement('div');
    el.className='combo';el.textContent=`x${count}`;
    el.style.fontSize=(14+count*2)+'px';
    el.style.left=x+'px';el.style.top=y+'px';
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),700);
  }

  showToast(msg,color){
    const el=document.createElement('div');
    el.className='toast-msg';el.textContent=msg;
    el.style.color=color||'var(--accent)';
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),1000);
  }

  showLevelComplete(){
    const g=this.game;
    const shardBonus=10*(g.level+1)+Math.floor(g.timeRemaining/5);
    const isLast=g.level>=g.totalDepths-1;
    const justUnlockedHard=isLast&&!g.hardMode&&localStorage.getItem('sweeper_hardUnlocked')!=='1';
    if(justUnlockedHard)localStorage.setItem('sweeper_beatNormal','1');
    const elapsed=this.levelStartTime?Math.floor((Date.now()-this.levelStartTime)/1000):60;
    const narratorLine=NARRATOR.react('levelComplete',{level:g.level,elapsed});
    this.setFlavor(narratorLine||'');

    // Preview next level modifiers
    let nextModsHTML='';
    if(!isLast&&g.hardMode){
      const preview=rollModifiers(g.level+1);
      g._nextModifiers=preview;
      nextModsHTML=`<div class="modifier-preview-label">Next Level</div>
        <div class="modifier-preview">
          ${preview.map(m=>`<div class="mp-item"><div class="mp-icon">${m.icon}</div><div class="mp-name">${m.name}</div><div class="mp-desc">${m.desc}</div></div>`).join('')}
        </div>`;
    }

    const shop=[
      {id:'timewarp',glyph:ICONS.time_glyph,name:'BACKUP',price:30},
      {id:'shield',glyph:ICONS.shield_glyph,name:'FIREWALL',price:46},
      {id:'compass',glyph:ICONS.compass_glyph,name:'SCANDISK',price:36},
      {id:'oracle',glyph:ICONS.oracle_glyph,name:'DEFRAG',price:42},
      {id:'lantern',glyph:ICONS.lantern_glyph,name:'TRACERT',price:48},
    ];
    const cursedShop=[
      {id:'hex',glyph:ICONS.hex_glyph,name:'SPYWARE',price:40,cursed:true},
      {id:'bargain',glyph:ICONS.bargain_glyph,name:'ADWARE',price:30,cursed:true},
      {id:'scapegoat',glyph:ICONS.scapegoat_glyph,name:'BLOATWARE',price:46,cursed:true},
      {id:'pyre',glyph:ICONS.pyre_glyph,name:'ROOTKIT',price:48,cursed:true},
    ];
    cursedShop.push({id:'tithe',glyph:ICONS.tithe_glyph,name:'TROJAN',price:36,cursed:true});
    let items;
    if(g.gameClass==='eden'){
      const shuffled=[...cursedShop].sort(()=>Math.random()-0.5);
      items=shuffled.slice(0,3);
    }else{
      const pool=g.gameClass==='wraith'?shop.filter(p=>p.id!=='shield'):[...shop];
      if(Math.random()<0.3){
        const cursed=cursedShop[Math.floor(Math.random()*cursedShop.length)];
        pool.push(cursed);
      }
      items=pool.sort(()=>Math.random()-0.5).slice(0,3);
    }

    const lastTitle=g.hardMode?'SYSTEM CLEARED':'ALL SECTORS SWEPT';
    const lastFlavor=justUnlockedHard?'Four levels cleared. A new file has appeared on your system.<br><br><span style="color:var(--accent);font-family:var(--font-mono);">Check C:\\ or the Desktop.</span>':(g.hardMode?'All levels swept. Process complete. Session terminated cleanly.':'Four levels cleared. Process complete.');

    let html=`<div class="modal-overlay" id="modal"><div class="modal level-complete">
      <h2>${isLast?lastTitle:'Level '+(g.level+1)+' Cleared'}</h2>
      <div class="flavor">${isLast?lastFlavor:(FLAVORS.levelComplete[g.level]||'Level cleared.')}</div>
      <div class="big-number">+${shardBonus}</div>
      <div class="big-label">Keys recovered</div>`;

    if(!isLast){
      html+=nextModsHTML;
      const shopLine=NARRATOR.react('shopOpen',{shards:g.shards});
      html+=`<div class="shop-header">${shopLine||'DEPENDENCIES'}</div>
        <div class="shop-shards" id="shop-shards">${g.shards} keys</div>
        <div class="shop-grid">
          ${items.map(p=>`<div class="shop-item ${p.cursed?'cursed':''} ${g.shards<p.price?'cant-afford':''}" data-pick="${p.id}" data-price="${p.price}" title="${p.name}">
            <div class="s-name">${p.name}</div>
            <div class="s-price">${p.price}&#x26BF;</div>
          </div>`).join('')}
        </div>
        <button class="btn btn-primary shop-descend" id="shop-descend">Continue</button>`;
    }else{
      html+=`<button class="btn btn-primary" id="modal-action">${justUnlockedHard?'Return':'Next Level'}</button>`;
    }
    html+='</div></div>';
    const _mt=document.body.classList.contains('exe-mode')&&document.getElementById('exe-win-sweeper')||document.body;
    _mt.insertAdjacentHTML('beforeend',html);

    if(isLast){
      document.getElementById('modal-action').addEventListener('click',()=>{
        document.getElementById('modal').remove();
        this.game.reset();
        if(justUnlockedHard){this.showStart();}else{this.startLevel();}
      });
    }else{
      const updateShop=()=>{
        const shardsEl=document.getElementById('shop-shards');
        if(shardsEl)shardsEl.textContent=g.shards+' keys';
        document.querySelectorAll('.shop-item').forEach(el=>{
          const price=+el.dataset.price;
          if(!el.classList.contains('bought')){
            el.classList.toggle('cant-afford',g.shards<price);
          }
        });
      };
      document.querySelectorAll('.shop-item').forEach(el=>{
        el.addEventListener('click',()=>{
          if(el.classList.contains('bought')||el.classList.contains('cant-afford'))return;
          const price=+el.dataset.price;
          if(g.shards<price)return;
          g.shards-=price;sfx.purchase();
          const pickId=el.dataset.pick;
          g.powerups.push(pickId);
          if(pickId==='scapegoat')g.scapegoatCharges+=2;
          el.classList.add('bought');
          sfx.powerup();
          if(el.closest('.shop-item')?.classList.contains('cursed')){const line=NARRATOR.react('boughtCursed');if(line)this.setFlavor(line);}
          else if(pickId==='shield'){const line=NARRATOR.react('boughtWard');if(line)this.setFlavor(line);}
          updateShop();
        });
      });
      document.getElementById('shop-descend').addEventListener('click',()=>{
        const carryTime=g.gameClass==='wraith'?0:Math.floor(g.timeRemaining*0.3);
        g.level++;g.initLevel();
        // Use previewed modifiers if available (so descent matches what player saw)
        if(g._nextModifiers){g.modifiers=g._nextModifiers;g._nextModifiers=null;}
        if(carryTime>0){g.timeRemaining+=carryTime;g.maxTime+=carryTime;}
        document.getElementById('modal').remove();
        this.startLevel();
      });
    }
  }

  showGameOver(){
    sfx.gameOver();
    const g=this.game;
    // Increment session count on failed run
    const s=parseInt(localStorage.getItem('sweeper_sessions')||'47',10)+1;
    localStorage.setItem('sweeper_sessions',String(s));
    const _mt=document.body.classList.contains('exe-mode')&&document.getElementById('exe-win-sweeper')||document.body;
    _mt.insertAdjacentHTML('beforeend',`
      <div class="modal-overlay" id="modal"><div class="modal game-over">
        <h2>PROCESS TERMINATED</h2>
        <div class="flavor">${NARRATOR.react('gameOver')||''}</div>
        <div class="go-body">
          <div class="go-stat"><span class="go-k">Level</span><span class="go-v">${g.level+1} of ${g.totalDepths}</span></div>
          <div class="go-stat"><span class="go-k">Keys</span><span class="go-v">${g.shards}</span></div>
          <div class="go-stat"><span class="go-k">Status</span><span class="go-v go-dead">FAULT</span></div>
        </div>
        <div class="go-actions"><button class="btn btn-primary" id="modal-action">Restart Process</button></div>
      </div></div>`);
    document.getElementById('modal-action').addEventListener('click',()=>{document.getElementById('modal').remove();this.game.reset();this.startLevel();});
  }

  usePowerup(type){
    sfx.init();if(this.game.gameOver)return;
    if(type==='timewarp'){
      if(this.game.useTimeWarp()){sfx.powerup();this.showToast('+20s','var(--accent)');this.renderBoard();}
    }else if(type==='compass'){
      const flagged=this.game.useCompass();
      if(flagged){sfx.powerup();this.showToast(flagged+' marked','var(--num-4)');this.renderBoard();}
    }else if(type==='oracle'){
      const result=this.game.useOracle();
      if(result){sfx.powerup();this.showToast(result.revealed.length+' safe / '+result.flagged.length+' marked','var(--num-6)');this.renderBoard();
        result.revealed.forEach(({r,c})=>{const idx=r*this.game.cols+c;const el=document.getElementById('grid')?.children[idx];if(el)el.classList.add('just-revealed');});
        if(this.game.gameWon){this.stopTimer();sfx.levelComplete();setTimeout(()=>this.showLevelComplete(),400);}
      }
    }else if(type==='lantern'){
      const result=this.game.useLantern();
      if(result.status==='ok'&&result.revealed?.length){
        sfx.powerup();this.showToast('LANTERN LIT','#C8A878');this.renderBoard();
        result.revealed.forEach(({r,c})=>{const idx=r*this.game.cols+c;const el=document.getElementById('grid')?.children[idx];if(el)el.classList.add('just-revealed');});
        if(this.game.gameWon){this.stopTimer();sfx.levelComplete();setTimeout(()=>this.showLevelComplete(),400);}
      }else{this.showToast('NO GOOD MARKS','var(--text-dim)');}
    }else if(type==='hex'){
      const results=this.game.useHex();
      if(results){sfx.powerup();this.showToast('5 DEAD TILES REVEALED','var(--danger)');this.renderBoard();
        results.forEach(({r,c})=>{const idx=r*this.game.cols+c;const el=document.getElementById('grid')?.children[idx];if(el)el.classList.add('just-revealed');});
        if(this.game.gameWon){this.stopTimer();sfx.levelComplete();setTimeout(()=>this.showLevelComplete(),400);}
      }
    }else if(type==='tithe'){
      const result=this.game.useTithe();
      if(result){sfx.powerup();this.showToast(result.added+' MARKED / '+result.removed+' WIPED / -20s','var(--danger)');this.renderBoard();
        if(this.game.timeRemaining<=0){this.game.gameOver=true;this.game.gameWon=false;this.stopTimer();sfx.gameOver();setTimeout(()=>this.showGameOver(),600);}
      }
    }else if(type==='bargain'){
      if(this.game.useBargain()){sfx.powerup();this.showToast('+30s / -50% KEYS 60s','var(--danger)');this.renderBoard();}
    }else if(type==='pyre'){
      const result=this.game.usePyre();
      if(result.status==='badFlag'){
        sfx.explosion();this.showToast('PYRE CONSUMES','var(--danger)');this.onMineHit(result.r,result.c);
      }else if(result.status==='ok'&&result.revealed?.length){
        sfx.powerup();this.showToast('PYRE BURNS','var(--danger)');this.renderBoard();
        result.revealed.forEach(({r,c})=>{const idx=r*this.game.cols+c;const el=document.getElementById('grid')?.children[idx];if(el)el.classList.add('just-revealed');});
        if(this.game.gameWon){this.stopTimer();sfx.levelComplete();setTimeout(()=>this.showLevelComplete(),400);}
      }else{this.showToast('NO MARKS','var(--text-dim)');}
    }else if(type==='scapegoat'){
      this.showToast('Passive — '+this.game.scapegoatCharges+' charge'+(this.game.scapegoatCharges===1?'':'s'),'var(--danger)');
    }
    if(this.game.consumeSurge())this.triggerSurge();
  }

  startTimer(){
    this.stopTimer();
    this.timerLastTick=Date.now();
    this.timerInterval=setInterval(()=>{
      if(this.game.gameOver){this.stopTimer();return;}
      const now=Date.now();const elapsed=Math.floor((now-this.timerLastTick)/1000);
      if(elapsed<1)return;
      this.timerLastTick=now-(((now-this.timerLastTick)%1000));
      for(let i=0;i<elapsed;i++){this.game.tick();if(this.game.gameOver)break;}
      const tv=document.getElementById('timer-val');
      const tb=document.getElementById('timer-bar');
      const mv=document.getElementById('mines-val');
      const isLow=this.game.timeRemaining<=15;

      if(tv){tv.textContent=this.fmtTime(this.game.timeRemaining);tv.className=`status-value ${isLow?'danger-text':'accent'}`;if(isLow)sfx.tick();}
      if(tb){const pct=this.game.maxTime>0?(this.game.timeRemaining/this.game.maxTime*100):0;tb.style.width=pct+'%';tb.className=`timer-bar ${isLow?'low':''}`;}
      if(mv)mv.textContent=this.game.mineCount-this.game.flagCount;
      const shv=document.getElementById('shard-val');if(shv)shv.textContent=this.game.shards;

      this.container.classList.toggle('danger',isLow&&!this.game.gameOver);
      if(isLow&&!this.dangerFlavorShown){this.dangerFlavorShown=true;this.setFlavor(randomFlavor('danger'));}

      if(this.game.gameOver&&!this.game.gameWon){
        this.setFlavor(NARRATOR.react('gameOver')||'');
        this.stopTimer();sfx.gameOver();setTimeout(()=>this.showGameOver(),600);
      }
    },1000);
  }

  stopTimer(){if(this.timerInterval){clearInterval(this.timerInterval);this.timerInterval=null;}}
  fmtTime(s){const m=Math.floor(s/60);return`${String(m).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;}

  saveGame(){
    this.stopTimer();
    const g=this.game;
    const saves=JSON.parse(localStorage.getItem('sweeper_saves')||'{}');
    const num=Object.keys(saves).length+1;
    const name=`THOMAS_${String(num).padStart(3,'0')}.SAV`;
    const winHTML=`
    <div class="exe-titlebar exe-titlebar-alert"><div class="exe-ttext"><span>SWEEPER.EXE</span></div><div class="exe-tbtns"><button class="exe-tbtn exe-close-btn" title="Close window">&times;</button></div></div>
    <div class="exe-modal-body">
      <div class="exe-modal-icon">&#x1F4BE;</div>
      <div class="exe-modal-text">Write session data to disk?<br><br><span style="font-family:monospace;font-size:10px;color:#404040;">${name}<br>Level ${g.level+1} &middot; ${g.shards} keys &middot; ${Math.floor(g.timeRemaining/60)}:${String(g.timeRemaining%60).padStart(2,'0')}</span></div>
    </div>
    <div class="exe-btn-row"><button class="exe-btn default" id="save-confirm">Write</button><button class="exe-btn" id="save-cancel">Cancel</button></div>`;
    const win=this._renderWin('saveconfirm',winHTML);
    win.querySelector('#save-cancel').addEventListener('click',()=>{this._closeWin('saveconfirm');this.startTimer();});
    win.querySelector('#save-confirm').addEventListener('click',()=>{
      const s={level:g.level,shards:g.shards,timeRemaining:g.timeRemaining,maxTime:g.maxTime,
        rows:g.rows,cols:g.cols,mineCount:g.mineCount,revealedCount:g.revealedCount,
        firstClick:g.firstClick,powerups:[...g.powerups],
        hardMode:g.hardMode,totalDepths:g.totalDepths,gameClass:g.gameClass,
        modifiers:g.modifiers.map(m=>m.id),surged:g.surged,bargainCurseTime:g.bargainCurseTime,scapegoatCharges:g.scapegoatCharges,timeMultiplier:g.timeMultiplier,
        board:g.board.map(row=>row.map(c=>({mine:c.mine,revealed:c.revealed,flagged:c.flagged,adjacent:c.adjacent})))};
      saves[name]=s;
      localStorage.setItem('sweeper_saves',JSON.stringify(saves));
      sfx.diskWrite();
      this._closeWin('saveconfirm');
      this.startTimer();
    });
  }

  loadGame(){
    this.showMyComputer('C:\\PROGRAM FILES\\SWEEPER\\SAVES');
  }

  _loadSaveFile(name){
    const saves=JSON.parse(localStorage.getItem('sweeper_saves')||'{}');
    const s=saves[name];
    if(!s)return;
    const cls=classById(s.gameClass||'sweeper');
    const timeStr=Math.floor(s.timeRemaining/60)+':'+String(s.timeRemaining%60).padStart(2,'0');
    const winHTML=`
    <div class="exe-titlebar exe-titlebar-alert"><div class="exe-ttext"><span>SWEEPER.EXE</span></div><div class="exe-tbtns"><button class="exe-tbtn exe-close-btn" title="Close window">&times;</button></div></div>
    <div class="exe-modal-body">
      <div class="exe-modal-icon">&#x1F4BE;</div>
      <div class="exe-modal-text">Load session from disk?<br>Current progress will be lost.<br><br><span style="font-family:monospace;font-size:10px;color:#404040;">${name}<br>Level ${s.level+1} &middot; ${cls.name} &middot; ${s.shards} keys &middot; ${timeStr}</span></div>
    </div>
    <div class="exe-btn-row"><button class="exe-btn default" id="load-confirm">Load</button><button class="exe-btn" id="load-cancel">Cancel</button></div>`;
    const win=this._renderWin('loadconfirm',winHTML);
    win.querySelector('#load-cancel').addEventListener('click',()=>this._closeWin('loadconfirm'));
    win.querySelector('#load-confirm').addEventListener('click',()=>{
      this._closeWin('loadconfirm');
      const g=this.game;
      g.level=s.level;g.shards=s.shards||0;g.timeRemaining=s.timeRemaining;g.maxTime=s.maxTime;
      g.rows=s.rows;g.cols=s.cols;g.mineCount=s.mineCount;g.revealedCount=s.revealedCount;
      g.firstClick=s.firstClick;g.powerups=s.powerups||[];g.gameOver=false;g.gameWon=false;g.board=s.board;
      g.hardMode=!!s.hardMode;g.totalDepths=s.totalDepths||(g.hardMode?5:4);g.gameClass=s.gameClass||'sweeper';
      g.modifiers=(s.modifiers||[]).map(id=>MODIFIERS.find(m=>m.id===id)).filter(Boolean);
      g.surged=!!s.surged;g.bargainCurseTime=s.bargainCurseTime||0;g._fracShards=0;g.scapegoatCharges=s.scapegoatCharges||0;g.timeMultiplier=s.timeMultiplier||1;
      this.renderBoard();this.startTimer();
    });
  }
}
