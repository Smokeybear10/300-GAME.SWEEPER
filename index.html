<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SWEEPER — Dark Atmospheric Minesweeper</title>
<meta name="description" content="Five depths of escalating minesweeper. Countdown timers. Artifacts. CRT terminal aesthetic. No mercy.">
<meta name="theme-color" content="#08080C">
<meta property="og:title" content="SWEEPER">
<meta property="og:description" content="Dark atmospheric minesweeper. Five depths. Countdown timers. Artifacts. No mercy.">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="SWEEPER">
<meta name="twitter:description" content="Dark atmospheric minesweeper. Five depths. Countdown timers. Artifacts. No mercy.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💀</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #08080C;
  --surface: #141420;
  --surface-revealed: #0C0C14;
  --accent: #D4E800;
  --danger: #E8243C;
  --text: #C8C8D4;
  --text-muted: #555568;
  --text-dim: #3A3A4A;
  --cell-border: rgba(255,255,255,0.04);
  --glow-accent: rgba(212,232,0,0.15);
  --glow-danger: rgba(232,36,60,0.15);
  --num-1: #4888CC;
  --num-2: #2BA84A;
  --num-3: #CC3344;
  --num-4: #7744AA;
  --num-5: #CC6622;
  --num-6: #22AAAA;
  --num-7: #AAAA44;
  --num-8: #777788;
  --font-display: 'Space Grotesk', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--font-mono);
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  user-select:none;
  -webkit-user-select:none;
  position:relative;
}

/* ======== BACKGROUND LAYERS ======== */
/* Infinite grid fading into darkness — the grid is everywhere */
.bg-grid{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:
    linear-gradient(rgba(212,232,0,0.012) 1px,transparent 1px),
    linear-gradient(90deg,rgba(212,232,0,0.012) 1px,transparent 1px);
  background-size:40px 40px;
  mask-image:radial-gradient(ellipse at center,rgba(0,0,0,0.4) 10%,transparent 55%);
  -webkit-mask-image:radial-gradient(ellipse at center,rgba(0,0,0,0.4) 10%,transparent 55%);
}
/* Slow drifting ambient glows */
.bg-glow{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  overflow:hidden;
}
.bg-glow .orb{
  position:absolute;
  border-radius:50%;
  filter:blur(80px);
  opacity:0;
  animation:orb-drift linear infinite;
}
.bg-glow .orb-1{
  width:400px;height:400px;
  background:radial-gradient(circle,rgba(212,232,0,0.04),transparent 70%);
  top:-10%;left:20%;
  animation-duration:25s;animation-delay:0s;
}
.bg-glow .orb-2{
  width:300px;height:300px;
  background:radial-gradient(circle,rgba(232,36,60,0.025),transparent 70%);
  bottom:10%;right:10%;
  animation-duration:30s;animation-delay:5s;
}
.bg-glow .orb-3{
  width:250px;height:250px;
  background:radial-gradient(circle,rgba(72,136,204,0.02),transparent 70%);
  top:40%;left:-5%;
  animation-duration:22s;animation-delay:10s;
}
@keyframes orb-drift{
  0%{opacity:0;transform:translate(0,0) scale(0.8);}
  15%{opacity:1;}
  50%{transform:translate(80px,40px) scale(1.2);}
  85%{opacity:1;}
  100%{opacity:0;transform:translate(-40px,80px) scale(0.9);}
}
/* Floating dust particles — canvas behind everything */
#dust-canvas{
  position:fixed;inset:0;z-index:0;pointer-events:none;
}

/* ======== CRT OVERLAY ======== */
body::before{
  content:'';
  position:fixed;
  inset:0;
  background:repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.08) 2px,
    rgba(0,0,0,0.08) 4px
  );
  pointer-events:none;
  z-index:1000;
}
body::after{
  content:'';
  position:fixed;
  inset:0;
  background:radial-gradient(ellipse at center,transparent 50%,rgba(0,0,0,0.6) 100%);
  pointer-events:none;
  z-index:999;
}
/* Subtle screen flicker */
@keyframes flicker{
  0%,100%{opacity:1;}
  92%{opacity:1;}
  93%{opacity:0.96;}
  94%{opacity:1;}
  97%{opacity:0.98;}
  98%{opacity:1;}
}
#screen{animation:flicker 8s infinite;}

/* Noise grain */
.noise{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:998;
  opacity:0.03;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}

/* ======== TITLE ======== */
.title{
  font-family:var(--font-display);
  font-size:28px;
  font-weight:700;
  letter-spacing:6px;
  color:var(--accent);
  text-shadow:0 0 30px var(--glow-accent),0 0 60px rgba(212,232,0,0.06);
  margin-bottom:4px;
  text-align:center;
  text-transform:uppercase;
}
.subtitle-flavor{
  font-size:10px;
  color:var(--text-dim);
  letter-spacing:3px;
  text-transform:uppercase;
  margin-bottom:14px;
  text-align:center;
}

/* ======== SHAKE ======== */
#game-wrapper{transition:transform 0.05s;}
#game-wrapper.shake{animation:shake 0.35s ease-out;}
@keyframes shake{
  0%{transform:translate(0,0) rotate(0);}
  10%{transform:translate(-6px,3px) rotate(-0.5deg);}
  20%{transform:translate(5px,-5px) rotate(0.3deg);}
  30%{transform:translate(-3px,2px) rotate(-0.2deg);}
  40%{transform:translate(3px,-3px) rotate(0.2deg);}
  50%{transform:translate(-2px,4px) rotate(-0.1deg);}
  60%{transform:translate(4px,-1px) rotate(0.1deg);}
  70%{transform:translate(-3px,2px);}
  80%{transform:translate(1px,-1px);}
  100%{transform:translate(0,0) rotate(0);}
}

/* ======== GAME CONTAINER ======== */
.game-container{
  background:var(--surface);
  border-radius:2px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,0.04);
  box-shadow:0 0 60px rgba(0,0,0,0.8),inset 0 0 80px rgba(0,0,0,0.3);
  max-width:95vw;
  position:relative;
  transition:box-shadow 0.5s;
}
.game-container::before{
  content:'';
  position:absolute;
  inset:0;
  background:radial-gradient(ellipse at 50% 30%,rgba(212,232,0,0.02),transparent 60%);
  pointer-events:none;
  z-index:1;
}
.game-container.danger{
  box-shadow:0 0 60px rgba(0,0,0,0.8),0 0 100px var(--glow-danger),inset 0 0 80px rgba(0,0,0,0.3);
  animation:danger-pulse 1.5s ease-in-out infinite;
}
@keyframes danger-pulse{
  0%,100%{box-shadow:0 0 60px rgba(0,0,0,0.8),0 0 60px var(--glow-danger),inset 0 0 80px rgba(0,0,0,0.3);}
  50%{box-shadow:0 0 60px rgba(0,0,0,0.8),0 0 140px rgba(232,36,60,0.2),inset 0 0 80px rgba(232,36,60,0.04);}
}

/* ======== STATUS BAR ======== */
.status-bar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 14px;
  background:rgba(0,0,0,0.4);
  border-bottom:1px solid var(--cell-border);
}
.status-item{display:flex;flex-direction:column;align-items:center;gap:1px;}
.status-label{font-size:8px;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;}
.status-value{font-size:18px;font-weight:700;font-variant-numeric:tabular-nums;}
.status-value.accent{color:var(--accent);text-shadow:0 0 12px var(--glow-accent);}
.status-value.danger-text{color:var(--danger);text-shadow:0 0 12px var(--glow-danger);animation:pulse-text 0.8s ease-in-out infinite;}
@keyframes pulse-text{0%,100%{opacity:1;}50%{opacity:0.4;}}

/* ======== LEVEL RUNES ======== */
.level-bar{display:flex;gap:8px;padding:8px 14px;background:rgba(0,0,0,0.2);justify-content:center;}
.level-rune{
  width:16px;height:16px;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;
  color:var(--text-dim);
  transition:all 0.3s;
  position:relative;
}
.level-rune.active{color:var(--accent);text-shadow:0 0 8px var(--glow-accent);transform:scale(1.2);}
.level-rune.completed{color:var(--accent);opacity:0.35;}

/* ======== TIMER BAR ======== */
.timer-bar-wrap{height:2px;background:rgba(255,255,255,0.02);}
.timer-bar{
  height:100%;
  background:var(--accent);
  box-shadow:0 0 8px var(--glow-accent);
  transition:width 0.3s linear,background 0.3s;
}
.timer-bar.low{
  background:var(--danger);
  box-shadow:0 0 12px var(--glow-danger);
  animation:pulse-bar 0.8s ease-in-out infinite;
}
@keyframes pulse-bar{0%,100%{opacity:1;}50%{opacity:0.4;}}

/* ======== POWER-UP BAR ======== */
.powerup-bar{display:flex;gap:6px;padding:4px 14px;background:rgba(0,0,0,0.15);min-height:22px;align-items:center;}
.powerup-badge{
  font-size:9px;letter-spacing:1.5px;text-transform:uppercase;
  padding:2px 8px;border-radius:2px;cursor:pointer;
  transition:all 0.15s;display:flex;align-items:center;gap:4px;
}
.powerup-badge .glyph{font-size:11px;}
.powerup-badge.scan{background:rgba(72,136,204,0.1);color:var(--num-1);border:1px solid rgba(72,136,204,0.2);}
.powerup-badge.timewarp{background:rgba(212,232,0,0.06);color:var(--accent);border:1px solid rgba(212,232,0,0.15);}
.powerup-badge.shield{background:rgba(43,168,74,0.08);color:var(--num-2);border:1px solid rgba(43,168,74,0.15);}
.powerup-badge.compass{background:rgba(124,77,255,0.08);color:var(--num-4);border:1px solid rgba(124,77,255,0.15);}
.powerup-badge.oracle{background:rgba(0,229,255,0.08);color:var(--num-6);border:1px solid rgba(0,229,255,0.15);}
.powerup-badge.rewind{background:rgba(180,140,255,0.08);color:#B48CFF;border:1px solid rgba(180,140,255,0.15);}
.powerup-badge.lantern{background:rgba(200,168,120,0.1);color:#C8A878;border:1px solid rgba(200,168,120,0.2);}
.powerup-badge.cursed{background:rgba(232,36,60,0.1);color:var(--danger);border:1px solid rgba(232,36,60,0.25);}
.powerup-badge:hover{transform:scale(1.05);filter:brightness(1.3);}
.powerup-badge.used{opacity:0.2;cursor:default;text-decoration:line-through;}

/* ======== GRID ======== */
.grid{display:grid;padding:4px;gap:1px;position:relative;z-index:2;}
.cell{
  aspect-ratio:1;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-mono);font-weight:700;
  border-radius:1px;cursor:pointer;
  transition:background 0.08s,transform 0.06s,box-shadow 0.1s;
  position:relative;font-variant-numeric:tabular-nums;
}
.cell.unrevealed{
  background:linear-gradient(145deg,rgba(24,24,38,0.9),rgba(18,18,28,0.9));
  border:1px solid var(--cell-border);
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.03),inset 0 -1px 0 rgba(0,0,0,0.2);
}
.cell.unrevealed:hover{
  background:linear-gradient(145deg,rgba(34,34,50,0.9),rgba(24,24,38,0.9));
  border-color:rgba(212,232,0,0.1);
  box-shadow:0 0 8px var(--glow-accent),inset 0 1px 0 rgba(255,255,255,0.04);
  transform:scale(1.04);
}
.cell.revealed{
  background:var(--surface-revealed);
  border:1px solid rgba(255,255,255,0.015);
}
.cell.just-revealed{animation:cell-flash 0.35s ease-out;}
@keyframes cell-flash{
  0%{background:rgba(212,232,0,0.15);box-shadow:0 0 12px var(--glow-accent);}
  100%{background:var(--surface-revealed);box-shadow:none;}
}
.cell.flagged{
  background:linear-gradient(145deg,rgba(24,24,38,0.9),rgba(18,18,28,0.9));
  border:1px solid rgba(232,36,60,0.15);
}
.cell.mine-hit{
  background:rgba(232,36,60,0.2);
  border:1px solid rgba(232,36,60,0.3);
  box-shadow:0 0 16px var(--glow-danger);
}
.cell.mine-reveal{
  background:rgba(232,36,60,0.08);
  border:1px solid rgba(232,36,60,0.1);
}

/* Cell SVG icons */
.cell svg{width:55%;height:55%;}
.cell .skull{fill:var(--danger);filter:drop-shadow(0 0 4px var(--glow-danger));}
.cell .stake{fill:var(--danger);opacity:0.9;}
.cell .stake-line{stroke:var(--danger);stroke-width:2;fill:none;opacity:0.9;}

/* ======== FOCUS STYLES ======== */
*:focus{outline:none;}
*:focus-visible{outline:1px solid var(--accent);outline-offset:2px;box-shadow:0 0 8px var(--glow-accent);}
.cell:focus-visible{outline-offset:0;transform:scale(1.04);}
.powerup-badge:focus-visible{outline-offset:1px;}
.powerup-option:focus-visible{border-color:var(--accent);box-shadow:0 0 20px var(--glow-accent);}

/* ======== CONTROLS ======== */
.controls{
  display:flex;justify-content:center;gap:6px;
  padding:10px 14px;background:rgba(0,0,0,0.3);
  border-top:1px solid var(--cell-border);
}
.btn{
  font-family:var(--font-mono);font-size:10px;font-weight:500;
  padding:6px 14px;border:none;border-radius:2px;
  cursor:pointer;transition:all 0.12s;letter-spacing:1.5px;text-transform:uppercase;
}
.btn-primary{background:var(--accent);color:var(--bg);box-shadow:0 0 12px var(--glow-accent);}
.btn-primary:hover{background:#E0F020;box-shadow:0 0 24px rgba(212,232,0,0.3);}
.btn-secondary{background:rgba(255,255,255,0.03);color:var(--text-muted);border:1px solid rgba(255,255,255,0.06);}
.btn-secondary:hover{background:rgba(255,255,255,0.06);color:var(--text);}

/* ======== COMBO ======== */
.combo{
  position:fixed;pointer-events:none;
  font-family:var(--font-mono);font-weight:700;
  color:var(--accent);
  text-shadow:0 0 16px var(--glow-accent);
  animation:combo-pop 0.7s ease-out forwards;z-index:100;
}
@keyframes combo-pop{
  0%{transform:scale(0.5) translateY(0);opacity:1;}
  40%{transform:scale(1.3) translateY(-15px);}
  100%{transform:scale(1) translateY(-45px);opacity:0;}
}

/* ======== MODAL ======== */
.modal-overlay{
  position:fixed;inset:0;
  background:rgba(8,8,12,0.9);
  display:flex;align-items:center;justify-content:center;
  z-index:500;
  animation:fade-in 0.3s ease-out;
}
@keyframes fade-in{from{opacity:0;}to{opacity:1;}}
.modal{
  background:linear-gradient(180deg,#101018,#0A0A10);
  border-radius:2px;padding:32px 28px;text-align:center;
  border:1px solid rgba(255,255,255,0.04);
  min-width:300px;max-width:90vw;
  box-shadow:0 0 80px rgba(0,0,0,0.8),inset 0 0 60px rgba(0,0,0,0.3);
  animation:modal-in 0.3s ease-out;
  position:relative;
}
.modal::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 20%,rgba(212,232,0,0.015),transparent 60%);
  pointer-events:none;
}
@keyframes modal-in{
  from{transform:scale(0.95) translateY(8px);opacity:0;}
  to{transform:scale(1) translateY(0);opacity:1;}
}
.modal h2{font-family:var(--font-display);font-size:22px;font-weight:700;margin-bottom:6px;letter-spacing:2px;}
.modal .flavor{font-size:11px;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:18px;}
.modal .big-number{font-size:36px;font-weight:700;margin-bottom:2px;letter-spacing:2px;}
.modal .big-label{font-size:9px;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:18px;}
.modal .btn{margin:4px;}
.modal.game-over h2{color:var(--danger);text-shadow:0 0 20px var(--glow-danger);}
.modal.game-over .big-number{color:var(--danger);}
.modal.level-complete h2{color:var(--accent);text-shadow:0 0 20px var(--glow-accent);}
.modal.level-complete .big-number{color:var(--accent);}

/* ======== POWER-UP CHOOSER ======== */
.artifact-text{font-size:11px;color:var(--text-dim);letter-spacing:1px;margin-bottom:14px;}
.powerup-chooser{display:flex;gap:10px;margin:12px 0;justify-content:center;flex-wrap:wrap;}
.powerup-option{
  background:linear-gradient(180deg,rgba(20,20,32,0.9),rgba(12,12,20,0.9));
  border:1px solid rgba(255,255,255,0.04);
  border-radius:2px;padding:16px 14px;cursor:pointer;
  transition:all 0.2s;width:120px;text-align:center;
  box-shadow:inset 0 0 30px rgba(0,0,0,0.2);
  position:relative;
}
.powerup-option:hover{
  border-color:var(--accent);
  box-shadow:0 0 20px var(--glow-accent),inset 0 0 30px rgba(212,232,0,0.02);
  transform:translateY(-3px);
}
.powerup-option .p-glyph{font-size:24px;margin-bottom:8px;display:block;}
.powerup-option .p-glyph.scan-g{color:var(--num-1);text-shadow:0 0 8px rgba(72,136,204,0.3);}
.powerup-option .p-glyph.time-g{color:var(--accent);text-shadow:0 0 8px var(--glow-accent);}
.powerup-option .p-glyph.shield-g{color:var(--num-2);text-shadow:0 0 8px rgba(43,168,74,0.3);}
.powerup-option .p-glyph.compass-g{color:var(--num-4);text-shadow:0 0 8px rgba(124,77,255,0.3);}
.powerup-option .p-glyph.oracle-g{color:var(--num-6);text-shadow:0 0 8px rgba(0,229,255,0.3);}
.powerup-option .p-glyph.rewind-g{color:#B48CFF;text-shadow:0 0 8px rgba(180,140,255,0.3);}
.powerup-option .p-glyph.lantern-g{color:#C8A878;text-shadow:0 0 8px rgba(200,168,120,0.3);}
.shop-header{font-size:11px;color:var(--text-dim);letter-spacing:2px;margin-bottom:4px;}
.shop-shards{font-family:var(--font-mono);font-size:16px;color:var(--accent);margin-bottom:12px;}
.shop-grid{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:8px 0;}
.shop-item{display:flex;flex-direction:column;align-items:center;padding:8px 10px;border:1px solid rgba(255,255,255,0.06);border-radius:4px;cursor:pointer;transition:all 0.15s;width:70px;background:rgba(255,255,255,0.02);}
.shop-item:hover{border-color:rgba(232,255,0,0.2);background:rgba(232,255,0,0.04);}
.shop-item.cant-afford{opacity:0.3;cursor:default;}
.shop-item.bought{opacity:0.15;cursor:default;text-decoration:line-through;}
.shop-item .s-glyph{font-size:18px;margin-bottom:4px;}
.shop-item .s-name{font-size:8px;letter-spacing:1px;text-transform:uppercase;margin-bottom:2px;text-align:center;}
.shop-item .s-price{font-family:var(--font-mono);font-size:10px;color:var(--accent);}
.shop-item.cursed{border-color:rgba(232,36,60,0.2);}
.shop-item.cursed:hover{border-color:rgba(232,36,60,0.4);background:rgba(232,36,60,0.06);}
.shop-item.cursed .s-name{color:var(--danger);}
.shop-item.cursed .s-price{color:var(--danger);}
.shop-descend{margin-top:14px;}
.powerup-option.cursed{border-color:rgba(232,36,60,0.3);background:rgba(232,36,60,0.04);}
.powerup-option.cursed:hover{border-color:rgba(232,36,60,0.5);background:rgba(232,36,60,0.08);}
.powerup-option.cursed .p-name{color:var(--danger);}
.powerup-option .p-glyph.cursed-g{color:var(--danger);text-shadow:0 0 8px rgba(232,36,60,0.4);}
.powerup-option .p-name{font-family:var(--font-display);font-size:12px;font-weight:600;margin-bottom:4px;letter-spacing:1px;}
.powerup-option .p-desc{font-size:9px;color:var(--text-dim);line-height:1.4;letter-spacing:0.5px;}

/* ======== START SCREEN ======== */
.start-screen{text-align:center;padding:40px 24px;}
.start-screen .flavor{font-size:11px;color:var(--text-dim);margin-bottom:24px;max-width:280px;line-height:1.6;letter-spacing:1px;}
.start-screen .btn{font-size:12px;padding:10px 28px;letter-spacing:3px;}
.hard-mode-toggle{display:flex;align-items:center;justify-content:center;gap:10px;margin:0 auto 20px;padding:10px 16px;max-width:260px;border:1px solid rgba(255,255,255,0.06);border-radius:2px;background:rgba(0,0,0,0.25);cursor:pointer;transition:all 0.15s;}
.hard-mode-toggle:hover:not(.locked){border-color:rgba(232,36,60,0.3);background:rgba(232,36,60,0.04);}
.hard-mode-toggle.locked{opacity:0.4;cursor:not-allowed;}
.hard-mode-toggle.active{border-color:rgba(232,36,60,0.5);background:rgba(232,36,60,0.08);box-shadow:0 0 20px rgba(232,36,60,0.1);}
.hard-mode-toggle .checkbox{width:12px;height:12px;border:1px solid var(--text-muted);border-radius:1px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.hard-mode-toggle.active .checkbox{border-color:var(--danger);background:var(--danger);box-shadow:0 0 8px var(--glow-danger);}
.hard-mode-toggle.active .checkbox::after{content:'\2713';font-size:10px;color:var(--bg);font-weight:900;line-height:1;}
.hard-mode-toggle .hm-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--text);font-weight:500;}
.hard-mode-toggle.active .hm-label{color:var(--danger);text-shadow:0 0 8px var(--glow-danger);}
.hard-mode-toggle.locked .hm-label{color:var(--text-dim);}
.hard-mode-toggle .hm-sub{font-size:8px;letter-spacing:1.5px;color:var(--text-dim);display:block;margin-top:2px;}

/* ======== CLASS PICKER ======== */
.class-picker{display:flex;gap:8px;margin:0 auto 18px;max-width:320px;justify-content:center;flex-wrap:wrap;}
.class-tile{flex:1;min-width:140px;max-width:160px;padding:12px 10px;border:1px solid rgba(255,255,255,0.06);border-radius:2px;background:rgba(0,0,0,0.25);cursor:pointer;transition:all 0.15s;text-align:center;}
.class-tile:hover:not(.locked){border-color:rgba(212,232,0,0.3);background:rgba(212,232,0,0.04);transform:translateY(-2px);}
.class-tile.active{border-color:var(--accent);background:rgba(212,232,0,0.08);box-shadow:0 0 20px rgba(212,232,0,0.15);}
.class-tile.locked{opacity:0.4;cursor:not-allowed;}
.class-tile .ct-icon{font-size:22px;color:var(--accent);margin-bottom:4px;text-shadow:0 0 8px var(--glow-accent);display:block;}
.class-tile.active .ct-icon{text-shadow:0 0 12px var(--glow-accent);}
.class-tile.locked .ct-icon{color:var(--text-dim);text-shadow:none;}
.class-tile .ct-name{font-family:var(--font-display);font-size:12px;font-weight:600;letter-spacing:1.5px;color:var(--text);margin-bottom:4px;text-transform:uppercase;}
.class-tile.active .ct-name{color:var(--accent);}
.class-tile.locked .ct-name{color:var(--text-dim);}
.class-tile .ct-desc{font-size:8px;letter-spacing:0.5px;color:var(--text-dim);line-height:1.4;}
.class-tile .ct-unlock{font-size:8px;letter-spacing:1px;color:var(--text-dim);text-transform:uppercase;margin-top:4px;font-style:italic;}
.class-picker-label{font-size:9px;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;}

/* ======== CLASS BADGE (in-game) ======== */
.class-badge{display:inline-flex;align-items:center;gap:4px;font-size:8px;letter-spacing:1.5px;text-transform:uppercase;padding:2px 8px;border-radius:2px;background:rgba(212,232,0,0.06);color:var(--accent);border:1px solid rgba(212,232,0,0.2);font-weight:500;}
.class-badge .cb-icon{font-size:10px;}

/* ======== MODIFIER BADGES ======== */
.modifier-bar{display:flex;gap:6px;padding:4px 14px 6px;background:rgba(0,0,0,0.15);justify-content:center;min-height:20px;align-items:center;flex-wrap:wrap;}
.modifier-badge{display:inline-flex;align-items:center;gap:4px;font-size:8px;letter-spacing:1.5px;text-transform:uppercase;padding:2px 8px;border-radius:2px;background:rgba(232,36,60,0.08);color:var(--danger);border:1px solid rgba(232,36,60,0.2);font-weight:500;}
.modifier-badge .mg{font-size:10px;}
.modifier-preview{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin:10px 0 14px;}
.modifier-preview .mp-item{display:flex;flex-direction:column;align-items:center;padding:8px 12px;border:1px solid rgba(232,36,60,0.25);border-radius:2px;background:rgba(232,36,60,0.05);max-width:130px;}
.modifier-preview .mp-icon{font-size:16px;color:var(--danger);margin-bottom:4px;text-shadow:0 0 6px var(--glow-danger);}
.modifier-preview .mp-name{font-family:var(--font-display);font-size:11px;font-weight:600;color:var(--danger);letter-spacing:1px;margin-bottom:2px;}
.modifier-preview .mp-desc{font-size:8px;color:var(--text-dim);line-height:1.3;letter-spacing:0.5px;text-align:center;}
.modifier-preview-label{font-size:9px;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;margin-top:10px;}

/* ======== MODIFIER EFFECTS ======== */
.cell.fogged{background:rgba(0,0,0,0.85)!important;border-color:rgba(255,255,255,0.02)!important;cursor:not-allowed;box-shadow:none!important;}
.cell.fogged:hover{transform:none!important;background:rgba(0,0,0,0.85)!important;border-color:rgba(255,255,255,0.02)!important;}
.cell.echo-fade .num-display{animation:echo-fade 10s ease-out forwards;}
.cell.echo-fade:hover .num-display{opacity:1!important;}
@keyframes echo-fade{
  0%,40%{opacity:1;}
  100%{opacity:0.08;}
}
.surge-flash{animation:surge-flash 0.8s ease-out;}
@keyframes surge-flash{
  0%{box-shadow:0 0 0 rgba(232,36,60,0);}
  30%{box-shadow:0 0 140px rgba(232,36,60,0.4),inset 0 0 80px rgba(232,36,60,0.1);}
  100%{box-shadow:0 0 60px rgba(0,0,0,0.8),inset 0 0 80px rgba(0,0,0,0.3);}
}

/* ======== CODEX ======== */
.codex-screen{padding:28px 22px 22px;max-width:520px;margin:0 auto;max-height:82vh;overflow-y:auto;}
.codex-screen::-webkit-scrollbar{width:6px;}
.codex-screen::-webkit-scrollbar-track{background:rgba(0,0,0,0.25);}
.codex-screen::-webkit-scrollbar-thumb{background:rgba(212,232,0,0.15);border-radius:2px;}
.codex-screen::-webkit-scrollbar-thumb:hover{background:rgba(212,232,0,0.3);}
.codex-header{text-align:center;margin-bottom:22px;padding-bottom:14px;border-bottom:1px solid rgba(255,255,255,0.06);}
.codex-header h2{font-family:var(--font-display);font-size:22px;font-weight:700;letter-spacing:6px;margin:0 0 6px;color:var(--text);text-transform:uppercase;}
.codex-header .codex-flavor{font-size:10px;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;}
.cdx-section{margin-bottom:20px;}
.cdx-h{font-family:var(--font-display);font-size:11px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--accent);margin-bottom:10px;padding-bottom:4px;border-bottom:1px solid rgba(212,232,0,0.15);text-shadow:0 0 8px var(--glow-accent);}

.cdx-body{font-size:11px;color:var(--text);line-height:1.6;letter-spacing:0.3px;}

.cdx-kv span:nth-child(odd){color:var(--accent);font-family:var(--font-mono);font-size:9px;letter-spacing:1px;text-transform:uppercase;white-space:nowrap;}

.cdx-table{width:100%;font-family:var(--font-mono);font-size:10px;border-collapse:collapse;}
.cdx-table th{color:var(--text-dim);font-weight:500;text-transform:uppercase;letter-spacing:1.5px;padding:4px 8px;text-align:left;font-size:9px;border-bottom:1px solid rgba(255,255,255,0.08);}
.cdx-table td{color:var(--text);padding:6px 8px;border-bottom:1px solid rgba(255,255,255,0.03);}
.cdx-table td:first-child{color:var(--accent);font-weight:700;}
.cdx-list{margin:0;padding-left:16px;font-size:11px;color:var(--text);line-height:1.7;letter-spacing:0.3px;}
.cdx-list li{margin-bottom:2px;}
.cdx-list li::marker{color:var(--accent);}
.cdx-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.cdx-relic{padding:10px 12px;border:1px solid rgba(255,255,255,0.06);border-radius:2px;background:rgba(0,0,0,0.25);transition:all 0.15s;}
.cdx-relic:hover{border-color:rgba(212,232,0,0.3);background:rgba(212,232,0,0.03);}
.cdx-relic.cursed{border-color:rgba(232,36,60,0.15);}
.cdx-relic.cursed:hover{border-color:rgba(232,36,60,0.35);background:rgba(232,36,60,0.04);}
.cr-head{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.cr-g{font-size:18px;color:var(--accent);text-shadow:0 0 6px var(--glow-accent);flex-shrink:0;width:20px;text-align:center;line-height:1;}
.cdx-relic.cursed .cr-g{color:var(--danger);text-shadow:0 0 6px var(--glow-danger);}
.cr-n{font-family:var(--font-display);font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--text);flex:1;}
.cdx-relic.cursed .cr-n{color:var(--danger);}
.cr-p{font-family:var(--font-mono);font-size:9px;color:var(--accent);letter-spacing:0.5px;}
.cdx-relic.cursed .cr-p{color:var(--danger);}
.cr-d{font-size:9px;color:var(--text-dim);line-height:1.5;letter-spacing:0.3px;}
.cr-boon{font-size:9px;color:var(--text);line-height:1.5;letter-spacing:0.3px;}
.cr-curse{font-size:9px;color:var(--danger);line-height:1.5;letter-spacing:0.3px;margin-top:3px;opacity:0.85;}
.codex-back-btn{margin-top:16px;width:100%;font-size:11px;letter-spacing:3px;padding:10px;}
.codex-link{background:none;border:none;color:var(--text-dim);font-family:var(--font-mono);font-size:9px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;padding:6px 14px;margin-top:4px;transition:all 0.15s;}
.codex-link:hover{color:var(--accent);text-shadow:0 0 8px var(--glow-accent);}

<script>
// ============================================================
// DUST PARTICLES (floating motes in a dark room)
// ============================================================
(function(){
  const canvas=document.getElementById('dust-canvas');
  const ctx=canvas.getContext('2d');
  let W,H;
  const particles=[];
  const COUNT=60;

  function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
  window.addEventListener('resize',resize);resize();

  for(let i=0;i<COUNT;i++){
    particles.push({
      x:Math.random()*W,
      y:Math.random()*H,
      r:Math.random()*1.2+0.3,
      dx:(Math.random()-0.5)*0.15,
      dy:Math.random()*-0.12-0.02,
      alpha:Math.random()*0.25+0.05,
      pulse:Math.random()*Math.PI*2,
      pulseSpeed:Math.random()*0.008+0.003,
    });
  }

  function draw(){
    ctx.clearRect(0,0,W,H);
    for(const p of particles){
      p.x+=p.dx;p.y+=p.dy;
      p.pulse+=p.pulseSpeed;
      const a=p.alpha*(0.6+0.4*Math.sin(p.pulse));
      // Wrap
      if(p.y<-10)p.y=H+10;
      if(p.x<-10)p.x=W+10;
      if(p.x>W+10)p.x=-10;

      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(200,200,212,${a})`;
      ctx.fill();
    }
    if(!document.hidden) requestAnimationFrame(draw);
  }
  draw();
  document.addEventListener('visibilitychange',()=>{if(!document.hidden)requestAnimationFrame(draw);});
})();

// ============================================================
// SVG ICONS (in-world, no emoji)
// ============================================================
const ICONS = {
  skull: `<svg viewBox="0 0 24 24"><path class="skull" d="M12 2C7.6 2 4 5.6 4 10c0 2.4 1.1 4.5 2.8 6H8v3c0 .6.4 1 1 1h1v1h4v-1h1c.6 0 1-.4 1-1v-3h1.2c1.7-1.5 2.8-3.6 2.8-6 0-4.4-3.6-8-8-8zM9 13c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm6 0c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2z"/></svg>`,
  stake: `<svg viewBox="0 0 24 24"><line class="stake-line" x1="12" y1="4" x2="12" y2="20"/><polygon class="stake" points="12,4 8,10 12,8 16,10"/></svg>`,
  eye: `<svg viewBox="0 0 20 20" style="width:10px;height:10px;"><circle cx="10" cy="10" r="3" fill="var(--text-dim)" opacity="0.4"/></svg>`,
  // Power-up glyphs (runic style)
  scan_glyph: '&#x25C9;',   // circled dot — the eye
  time_glyph: '&#x29D6;',   // hourglass
  shield_glyph: '&#x2666;', // diamond ward
  compass_glyph: '&#x2316;', // crosshair — the compass
  oracle_glyph: '&#x25CE;',  // bullseye — the oracle
  rewind_glyph: '&#x21BA;',  // loop arrow — rewind
  lantern_glyph: '&#x2600;',   // black sun — the lantern
  hex_glyph: '&#x2627;',   // chi rho — the hex
  tithe_glyph: '&#x2020;',   // dagger — blood tithe
  bargain_glyph: '&#x2622;', // trefoil — the bargain
  scapegoat_glyph: '&#x2625;', // ankh — the scapegoat
  pyre_glyph: '&#x1F525;',    // fire — the pyre
  rift_glyph: '&#x2739;',      // 12-point star — the rift
  // Level indicators — I-Ching trigrams (descent/depth)
  runes: ['&#x2630;', '&#x2631;', '&#x2632;', '&#x2633;', '&#x2634;'], // ☰ ☱ ☲ ☳ ☴
};

// ============================================================
// SOUND ENGINE (atmospheric, darker)
// ============================================================
class SoundEngine {
  constructor(){this.muted=false;this.ctx=null;this.ambientNode=null;}

  init(){
    if(this.ctx)return;
    this.ctx=new(window.AudioContext||window.webkitAudioContext)();
    this.master=this.ctx.createGain();
    this.master.gain.value=0.7;
    this.master.connect(this.ctx.destination);
  }

  toggle(){
    this.muted=!this.muted;
    const btn=document.getElementById('mute-btn');
    btn.innerHTML=this.muted?'&#215;':'&#9835;';
    btn.setAttribute('aria-pressed',String(this.muted));
    if(this.muted&&this.ambientNode){this.ambientNode.gain.linearRampToValueAtTime(0,this.ctx.currentTime+0.3);}
  }

  play(fn){if(this.muted||!this.ctx)return;try{fn(this.ctx,this.master);}catch(e){}}

  // Metallic click — like a tile on stone
  reveal(){
    this.play((ctx,out)=>{
      const buf=ctx.createBuffer(1,ctx.sampleRate*0.04,ctx.sampleRate);
      const d=buf.getChannelData(0);
      for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,6);
      const src=ctx.createBufferSource();src.buffer=buf;
      const f=ctx.createBiquadFilter();f.type='bandpass';f.frequency.value=3000;f.Q.value=4;
      const g=ctx.createGain();g.gain.value=0.12;
      src.connect(f).connect(g).connect(out);src.start();
    });
  }

  // Dull thud — placing a stake
  flag(){
    this.play((ctx,out)=>{
      const o=ctx.createOscillator();const g=ctx.createGain();
      o.type='sine';o.frequency.setValueAtTime(120,ctx.currentTime);
      o.frequency.exponentialRampToValueAtTime(60,ctx.currentTime+0.08);
      g.gain.setValueAtTime(0.15,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.1);
      o.connect(g).connect(out);o.start();o.stop(ctx.currentTime+0.1);
      // click layer
      const buf=ctx.createBuffer(1,ctx.sampleRate*0.02,ctx.sampleRate);
      const d=buf.getChannelData(0);
      for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,8);
      const src=ctx.createBufferSource();src.buffer=buf;
      const g2=ctx.createGain();g2.gain.value=0.08;
      src.connect(g2).connect(out);src.start();
    });
  }

  // Soft lift
  unflag(){
    this.play((ctx,out)=>{
      const o=ctx.createOscillator();const g=ctx.createGain();
      o.type='sine';o.frequency.setValueAtTime(180,ctx.currentTime);
      o.frequency.exponentialRampToValueAtTime(90,ctx.currentTime+0.06);
      g.gain.setValueAtTime(0.08,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.08);
      o.connect(g).connect(out);o.start();o.stop(ctx.currentTime+0.08);
    });
  }

  // Explosion — deep rumble + noise burst
  explosion(){
    this.play((ctx,out)=>{
      // Noise burst
      const len=ctx.sampleRate*0.5;
      const buf=ctx.createBuffer(1,len,ctx.sampleRate);
      const d=buf.getChannelData(0);
      for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/len,1.5);
      const src=ctx.createBufferSource();src.buffer=buf;
      const f=ctx.createBiquadFilter();f.type='lowpass';
      f.frequency.setValueAtTime(600,ctx.currentTime);
      f.frequency.exponentialRampToValueAtTime(40,ctx.currentTime+0.4);
      const g=ctx.createGain();g.gain.setValueAtTime(0.35,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.5);
      src.connect(f).connect(g).connect(out);src.start();
      // Sub rumble
      const o=ctx.createOscillator();const g2=ctx.createGain();
      o.type='sine';o.frequency.setValueAtTime(50,ctx.currentTime);
      o.frequency.exponentialRampToValueAtTime(20,ctx.currentTime+0.4);
      g2.gain.setValueAtTime(0.25,ctx.currentTime);
      g2.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.5);
      o.connect(g2).connect(out);o.start();o.stop(ctx.currentTime+0.5);
    });
  }

  // Clock tick in an empty room
  tick(){
    this.play((ctx,out)=>{
      const buf=ctx.createBuffer(1,ctx.sampleRate*0.015,ctx.sampleRate);
      const d=buf.getChannelData(0);
      for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,12);
      const src=ctx.createBufferSource();src.buffer=buf;
      const f=ctx.createBiquadFilter();f.type='bandpass';f.frequency.value=2000;f.Q.value=8;
      const g=ctx.createGain();g.gain.value=0.06;
      src.connect(f).connect(g).connect(out);src.start();
    });
  }

  // Eerie ascending — something dark acknowledging you
  levelComplete(){
    this.play((ctx,out)=>{
      const notes=[220,277,330,440];
      notes.forEach((freq,i)=>{
        const o=ctx.createOscillator();const g=ctx.createGain();
        o.type='triangle';
        o.frequency.setValueAtTime(freq,ctx.currentTime+i*0.18);
        g.gain.setValueAtTime(0.1,ctx.currentTime+i*0.18);
        g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+i*0.18+0.5);
        o.connect(g).connect(out);
        o.start(ctx.currentTime+i*0.18);o.stop(ctx.currentTime+i*0.18+0.5);
      });
    });
  }

  // Descending doom
  gameOver(){
    this.play((ctx,out)=>{
      const notes=[300,250,180,100];
      notes.forEach((freq,i)=>{
        const o=ctx.createOscillator();const g=ctx.createGain();
        o.type='sawtooth';
        o.frequency.setValueAtTime(freq,ctx.currentTime+i*0.2);
        o.frequency.exponentialRampToValueAtTime(freq*0.7,ctx.currentTime+i*0.2+0.3);
        g.gain.setValueAtTime(0.06,ctx.currentTime+i*0.2);
        g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+i*0.2+0.4);
        o.connect(g).connect(out);
        o.start(ctx.currentTime+i*0.2);o.stop(ctx.currentTime+i*0.2+0.4);
      });
    });
  }

  // Dark resonant chime
  powerup(){
    this.play((ctx,out)=>{
      [330,440].forEach((freq,i)=>{
        const o=ctx.createOscillator();const g=ctx.createGain();
        o.type='sine';
        o.frequency.setValueAtTime(freq,ctx.currentTime+i*0.08);
        g.gain.setValueAtTime(0.12,ctx.currentTime+i*0.08);
        g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+i*0.08+0.4);
        o.connect(g).connect(out);
        o.start(ctx.currentTime+i*0.08);o.stop(ctx.currentTime+i*0.08+0.4);
      });
    });
  }

  // Shield ward sound
  shieldBlock(){
    this.play((ctx,out)=>{
      const o=ctx.createOscillator();const g=ctx.createGain();
      o.type='sine';
      o.frequency.setValueAtTime(800,ctx.currentTime);
      o.frequency.exponentialRampToValueAtTime(200,ctx.currentTime+0.15);
      g.gain.setValueAtTime(0.15,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.25);
      o.connect(g).connect(out);o.start();o.stop(ctx.currentTime+0.25);
    });
  }
}

  _pick(key){const arr=this[key];return arr?arr[Math.floor(Math.random()*arr.length)]:null;},

// ============================================================
// GAME MODEL
// ============================================================
const LEVELS=[
  {rows:8,cols:8,mines:10,time:150},
  {rows:10,cols:10,mines:15,time:140},
  {rows:12,cols:12,mines:25,time:130},
  {rows:14,cols:14,mines:35,time:120},
  {rows:16,cols:16,mines:50,time:110},
];
const NUM_COLORS=['','var(--num-1)','var(--num-2)','var(--num-3)','var(--num-4)','var(--num-5)','var(--num-6)','var(--num-7)','var(--num-8)'];

class Game{
  constructor(){this.hardMode=false;this.gameClass='sweeper';this.reset();}
  reset(){
    this.level=0;this.shards=0;this.powerups=[];
    this.bargainCurseTime=0;this._fracShards=0;this.scapegoatCharges=0;
    this.totalDepths=this.hardMode?5:4;
    this.initLevel();
  }
  awardShards(n){
    if(this.bargainCurseTime>0){
      this._fracShards+=n*0.5;
      const whole=Math.floor(this._fracShards);
      this.shards+=whole;this._fracShards-=whole;
    }else{this.shards+=n;}
  }
  initLevel(){
    const cfg=LEVELS[this.level];
    this.modifiers=this.hardMode?rollModifiers(this.level):[];
    this.rows=cfg.rows;this.cols=cfg.cols;this.mineCount=cfg.mines;
    let t=cfg.time;
    if(this.gameClass==='wraith')t-=15;
    this.timeRemaining=t;this.maxTime=t;
    this.board=Array.from({length:this.rows},()=>Array.from({length:this.cols},()=>({mine:false,revealed:false,flagged:false,adjacent:0})));
    this.gameOver=false;this.gameWon=false;this.firstClick=true;this.revealedCount=0;this.shieldUsed=false;this.aegisCursed=false;
    this.surged=false;this.timeMultiplier=1;
  }
  hasModifier(id){return this.modifiers.some(m=>m.id===id);}
  placeMines(safeR,safeC){
    let placed=0;
    while(placed<this.mineCount){
      const r=Math.floor(Math.random()*this.rows),c=Math.floor(Math.random()*this.cols);
      if(Math.abs(r-safeR)<=1&&Math.abs(c-safeC)<=1)continue;
      if(this.board[r][c].mine)continue;
      this.board[r][c].mine=true;placed++;
    }
    for(let r=0;r<this.rows;r++)for(let c=0;c<this.cols;c++)
      if(!this.board[r][c].mine)this.board[r][c].adjacent=this.countAdj(r,c);
  }
  countAdj(r,c){
    let n=0;
    for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){
      if(!dr&&!dc)continue;const nr=r+dr,nc=c+dc;
      if(nr>=0&&nr<this.rows&&nc>=0&&nc<this.cols&&this.board[nr][nc].mine)n++;
    }return n;
  }
  chord(r,c){
    const cell=this.board[r][c];
    if(!cell.revealed||cell.mine||cell.adjacent===0)return[];
    let flags=0;
    for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){
      if(!dr&&!dc)continue;const nr=r+dr,nc=c+dc;
      if(nr>=0&&nr<this.rows&&nc>=0&&nc<this.cols&&this.board[nr][nc].flagged)flags++;
    }
    if(flags!==cell.adjacent)return[];
    const results=[];
    for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){
      if(!dr&&!dc)continue;const nr=r+dr,nc=c+dc;
      if(nr>=0&&nr<this.rows&&nc>=0&&nc<this.cols&&!this.board[nr][nc].flagged&&!this.board[nr][nc].revealed){
        const res=this.reveal(nr,nc);results.push(...res);
      }
    }
    return results;
  }
  reveal(r,c){
    if(r<0||r>=this.rows||c<0||c>=this.cols)return[];
    const cell=this.board[r][c];
    if(cell.flagged||cell.revealed||this.gameOver)return[];
    if(this.firstClick){this.placeMines(r,c);this.firstClick=false;}
    cell.revealed=true;this.revealedCount++;
    const out=[{r,c}];
    if(cell.mine){
      const si=this.powerups.indexOf('shield');
      if(si!==-1&&!this.shieldUsed&&!this.aegisCursed){
        this.shieldUsed=true;this.powerups.splice(si,1);
        cell.revealed=false;this.revealedCount--;cell.mine=false;
        cell.adjacent=this.countAdj(r,c);
        for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){
          const nr=r+dr,nc=c+dc;
          if(nr>=0&&nr<this.rows&&nc>=0&&nc<this.cols&&!this.board[nr][nc].mine)
            this.board[nr][nc].adjacent=this.countAdj(nr,nc);
        }
        return[{r,c,shieldBlocked:true}];
      }
      const sg=this.powerups.indexOf('scapegoat');
      if(sg!==-1&&this.scapegoatCharges>0&&!this.aegisCursed){
        this.scapegoatCharges--;this.timeMultiplier*=2;
        if(this.scapegoatCharges<=0)this.powerups=this.powerups.filter(p=>p!=='scapegoat');
        cell.revealed=false;this.revealedCount--;cell.mine=false;
        cell.adjacent=this.countAdj(r,c);
        for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){
          const nr=r+dr,nc=c+dc;
          if(nr>=0&&nr<this.rows&&nc>=0&&nc<this.cols&&!this.board[nr][nc].mine)
            this.board[nr][nc].adjacent=this.countAdj(nr,nc);
        }
        return[{r,c,scapegoatBlocked:true}];
      }
      this.gameOver=true;this.gameWon=false;return[{r,c,mine:true}];
    }
    this.awardShards(1);
    cell.revealedAt=Date.now();
    if(cell.adjacent===0)
      for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){
        if(!dr&&!dc)continue;out.push(...this.reveal(r+dr,c+dc));
      }
    this.checkSurge();this.checkWin();return out;
  }
  checkSurge(){
    if(this.surged||!this.hasModifier('surge'))return;
    const safeTotal=this.rows*this.cols-this.mineCount;
    if(this.revealedCount>=Math.floor(safeTotal/2)){this.surged=true;this.pendingSurge=true;}
  }
  consumeSurge(){const v=this.pendingSurge;this.pendingSurge=false;return v;}
  displayAdjacent(cell){
    if(cell.adjacent===0)return 0;
    let n=cell.adjacent;
    if(this.surged&&this.hasModifier('surge'))n=Math.min(n+1,8);
    return n;
  }
  isVisible(r,c){
    if(!this.hasModifier('fog'))return true;
    if(this.firstClick)return true;
    const cell=this.board[r][c];
    if(cell.revealed||cell.flagged)return true;
    for(let dr=-2;dr<=2;dr++)for(let dc=-2;dc<=2;dc++){
      const nr=r+dr,nc=c+dc;
      if(nr>=0&&nr<this.rows&&nc>=0&&nc<this.cols&&this.board[nr][nc].revealed)return true;
    }
    return false;
  }
  toggleFlag(r,c){
    if(r<0||r>=this.rows||c<0||c>=this.cols)return false;
    const cell=this.board[r][c];if(cell.revealed||this.gameOver)return false;
    cell.flagged=!cell.flagged;return true;
  }
  checkWin(){
    if(this.revealedCount>=this.rows*this.cols-this.mineCount){
      this.gameWon=true;this.gameOver=true;
      this.awardShards(10*(this.level+1)+Math.floor(this.timeRemaining/5));
    }
  }
  tick(){if(this.gameOver)return;const mult=this.timeMultiplier||1;this.timeRemaining=Math.max(0,this.timeRemaining-mult);if(this.bargainCurseTime>0)this.bargainCurseTime=Math.max(0,this.bargainCurseTime-1);if(this.timeRemaining<=0){this.gameOver=true;this.gameWon=false;}}
  useScan(){
    const idx=this.powerups.indexOf('scan');if(idx===-1)return null;
    const safe=[];
    for(let r=0;r<this.rows;r++)for(let c=0;c<this.cols;c++)
      if(!this.board[r][c].mine&&!this.board[r][c].revealed&&!this.board[r][c].flagged)safe.push({r,c});
    if(!safe.length)return null;
    this.powerups.splice(idx,1);
    const picks=safe.sort(()=>Math.random()-0.5).slice(0,3);
    const revealed=[];
    picks.forEach(({r,c})=>{if(!this.board[r][c].revealed){const res=this.reveal(r,c);revealed.push(...res);}});
    return revealed.length?revealed:null;
  }
  useTimeWarp(){
    const idx=this.powerups.indexOf('timewarp');if(idx===-1)return false;
    this.powerups.splice(idx,1);this.timeRemaining=Math.min(this.timeRemaining+20,this.maxTime+20);return true;
  }
  useCompass(){
    const idx=this.powerups.indexOf('compass');if(idx===-1)return 0;
    this.powerups.splice(idx,1);
    const mines=[];
    for(let r=0;r<this.rows;r++)for(let c=0;c<this.cols;c++)
      if(this.board[r][c].mine&&!this.board[r][c].flagged)mines.push({r,c});
    const shuffled=mines.sort(()=>Math.random()-0.5);
    const toFlag=shuffled.slice(0,3);
    toFlag.forEach(({r,c})=>{this.board[r][c].flagged=true;});
    return toFlag.length;
  }
  useOracle(){
    const idx=this.powerups.indexOf('oracle');if(idx===-1)return null;
    const candidates=[];
    for(let r=0;r<this.rows-1;r++)for(let c=0;c<this.cols-1;c++){
      let hasUnknown=false;
      for(let dr=0;dr<2;dr++)for(let dc=0;dc<2;dc++){
        const cell=this.board[r+dr][c+dc];
        if(!cell.revealed&&!cell.flagged){hasUnknown=true;break;}
      }
      if(hasUnknown)candidates.push({r,c});
    }
    if(!candidates.length)return null;
    this.powerups.splice(idx,1);
    const corner=candidates[Math.floor(Math.random()*candidates.length)];
    const revealed=[],flagged=[];
    for(let dr=0;dr<2;dr++)for(let dc=0;dc<2;dc++){
      const nr=corner.r+dr,nc=corner.c+dc;
      const cell=this.board[nr][nc];
      if(cell.revealed||cell.flagged)continue;
      if(cell.mine){cell.flagged=true;flagged.push({r:nr,c:nc});}
      else{const res=this.reveal(nr,nc);revealed.push(...res);}
    }
    return{revealed,flagged};
  }
  useRewind(){
    const idx=this.powerups.indexOf('rewind');if(idx===-1)return false;
    this.powerups.splice(idx,1);
    const keepTime=this.timeRemaining;const keepMax=this.maxTime;
    this.initLevel();
    this.timeRemaining=keepTime;this.maxTime=keepMax;
    return true;
  }
  useLantern(){
    const idx=this.powerups.indexOf('lantern');if(idx===-1)return{status:'none'};
    const candidates=[];
    for(let r=0;r<this.rows;r++)for(let c=0;c<this.cols;c++){
      if(!this.board[r][c].flagged||!this.board[r][c].mine)continue;
      let hasEmpty=false;
      for(let dr=-1;dr<=1&&!hasEmpty;dr++)for(let dc=-1;dc<=1&&!hasEmpty;dc++){
        if(!dr&&!dc)continue;
        const nr=r+dr,nc=c+dc;
        if(nr>=0&&nr<this.rows&&nc>=0&&nc<this.cols&&!this.board[nr][nc].mine&&!this.board[nr][nc].revealed)hasEmpty=true;
      }
      if(hasEmpty)candidates.push({r,c});
    }
    if(!candidates.length)return{status:'none'};
    this.powerups.splice(idx,1);
    const target=candidates[Math.floor(Math.random()*candidates.length)];
    const revealed=[];
    for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){
      if(!dr&&!dc)continue;
      const nr=target.r+dr,nc=target.c+dc;
      if(nr>=0&&nr<this.rows&&nc>=0&&nc<this.cols&&!this.board[nr][nc].mine&&!this.board[nr][nc].revealed){
        const res=this.reveal(nr,nc);revealed.push(...res);
      }
    }
    return{status:'ok',revealed};
  }
  useHex(){
    const idx=this.powerups.indexOf('hex');if(idx===-1)return null;
    this.powerups.splice(idx,1);
    this.aegisCursed=true;
    const safe=[];
    for(let r=0;r<this.rows;r++)for(let c=0;c<this.cols;c++)
      if(!this.board[r][c].mine&&!this.board[r][c].revealed&&!this.board[r][c].flagged)safe.push({r,c});
    const shuffled=safe.sort(()=>Math.random()-0.5).slice(0,5);
    const revealed=[];
    shuffled.forEach(({r,c})=>{const res=this.reveal(r,c);revealed.push(...res);});
    return revealed.length?revealed:null;
  }
  useTithe(){
    const idx=this.powerups.indexOf('tithe');if(idx===-1)return null;
    this.powerups.splice(idx,1);
    let removed=0;
    for(let r=0;r<this.rows;r++)for(let c=0;c<this.cols;c++){
      if(this.board[r][c].flagged){this.board[r][c].flagged=false;removed++;}
    }
    const mines=[];
    for(let r=0;r<this.rows;r++)for(let c=0;c<this.cols;c++)
      if(this.board[r][c].mine&&!this.board[r][c].flagged)mines.push({r,c});
    const toFlag=mines.sort(()=>Math.random()-0.5).slice(0,5);
    toFlag.forEach(({r,c})=>{this.board[r][c].flagged=true;});
    return{removed,added:toFlag.length};
  }
  useBargain(){
    const idx=this.powerups.indexOf('bargain');if(idx===-1)return false;
    this.powerups.splice(idx,1);
    this.bargainCurseTime+=60;
    this.timeRemaining=Math.min(this.timeRemaining+40,this.maxTime+40);
    return true;
  }
  useRift(){
    const idx=this.powerups.indexOf('rift');if(idx===-1)return null;
    const candidates=[];
    for(let r=0;r<this.rows-2;r++)for(let c=0;c<this.cols-2;c++){
      let hasUnknown=false;
      for(let dr=0;dr<3&&!hasUnknown;dr++)for(let dc=0;dc<3&&!hasUnknown;dc++){
        const cell=this.board[r+dr][c+dc];
        if(!cell.revealed&&!cell.flagged)hasUnknown=true;
      }
      if(hasUnknown)candidates.push({r,c});
    }
    if(!candidates.length)return null;
    this.powerups.splice(idx,1);
    this.timeRemaining=Math.max(this.timeRemaining-20,1);
    const corner=candidates[Math.floor(Math.random()*candidates.length)];
    const revealed=[],flagged=[];
    for(let dr=0;dr<3;dr++)for(let dc=0;dc<3;dc++){
      const nr=corner.r+dr,nc=corner.c+dc;
      const cell=this.board[nr][nc];
      if(cell.revealed||cell.flagged)continue;
      if(cell.mine){cell.flagged=true;flagged.push({r:nr,c:nc});}
      else{const res=this.reveal(nr,nc);revealed.push(...res);}
    }
    // Seed 1 new mine into unrevealed area
    const seedable=[];
    for(let r=0;r<this.rows;r++)for(let c=0;c<this.cols;c++){
      const cell=this.board[r][c];
      if(!cell.revealed&&!cell.flagged&&!cell.mine)seedable.push({r,c});
    }
    let seeded=0;
    if(seedable.length){
      const s=seedable[Math.floor(Math.random()*seedable.length)];
      this.board[s.r][s.c].mine=true;this.mineCount++;seeded=1;
      for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){
        const nr=s.r+dr,nc=s.c+dc;
        if(nr>=0&&nr<this.rows&&nc>=0&&nc<this.cols&&!this.board[nr][nc].mine)
          this.board[nr][nc].adjacent=this.countAdj(nr,nc);
      }
    }
    return{revealed,flagged,seeded};
  }
  usePyre(){
    const idx=this.powerups.indexOf('pyre');if(idx===-1)return{status:'none'};
    const flagged=[];
    for(let r=0;r<this.rows;r++)for(let c=0;c<this.cols;c++)
      if(this.board[r][c].flagged)flagged.push({r,c});
    if(!flagged.length)return{status:'none'};
    this.powerups.splice(idx,1);
    const badFlag=flagged.find(({r,c})=>!this.board[r][c].mine);
    if(badFlag){this.gameOver=true;this.gameWon=false;return{status:'badFlag',r:badFlag.r,c:badFlag.c};}
    const revealed=[];
    flagged.forEach(({r,c})=>{
      for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){
        if(!dr&&!dc)continue;
        const nr=r+dr,nc=c+dc;
        if(nr>=0&&nr<this.rows&&nc>=0&&nc<this.cols&&!this.board[nr][nc].mine&&!this.board[nr][nc].revealed){
          const res=this.reveal(nr,nc);revealed.push(...res);
        }
      }
    });
    return{status:'ok',revealed};
  }
  get flagCount(){let n=0;for(let r=0;r<this.rows;r++)for(let c=0;c<this.cols;c++)if(this.board[r][c].flagged)n++;return n;}
}

const CLASSES=[
  {id:'sweeper',name:'The Sweeper',desc:'Baseline. Clean minesweeper.',icon:'&#x16A0;',unlockReq:null},
  {id:'wraith',name:'The Wraith',desc:'Combos bank time. -15s per depth.',icon:'&#x16B7;',unlockReq:'hit an 8-combo'},
];
function classById(id){return CLASSES.find(c=>c.id===id)||CLASSES[0];}
function isClassUnlocked(id){
  return true; // DEV: all classes unlocked for testing
}

// ============================================================
// DEPTH MODIFIERS (Hard Mode only)
// ============================================================
const MODIFIERS=[
  {id:'fog',name:'Fog',desc:'Only tiles within 2 of revealed are visible',icon:'&#x2601;'},
  {id:'cryptic',name:'Cryptic',desc:'Numbers 4 or higher show as ?',icon:'&#x2753;'},
  {id:'echo',name:'Echo',desc:'Numbers fade over 10 seconds, hover to refresh',icon:'&#x25D4;'},
  {id:'surge',name:'Surge',desc:'Halfway through, all numbers gain +1',icon:'&#x26A1;'},
];
// Hard mode: D1-D3 = 1 modifier, D4-D5 = 2 modifiers stacked
function rollModifiers(level){
  const count=level>=3?2:1;
  const pool=[...MODIFIERS];
  const picked=[];
  for(let i=0;i<count&&pool.length;i++){
    const idx=Math.floor(Math.random()*pool.length);
    picked.push(pool.splice(idx,1)[0]);
  }
  return picked;
}

  renderBoard(){
    const g=this.game;
    const maxW=Math.min(window.innerWidth*0.92,520);
    const cellSize=Math.min(Math.floor((maxW-8)/g.cols),34);

    let powerupsHTML='';
    if(g.powerups.length>0){
      const PMAP={scan:{cls:'scan',glyph:ICONS.scan_glyph,label:'Eye'},timewarp:{cls:'timewarp',glyph:ICONS.time_glyph,label:'Warp'},shield:{cls:'shield',glyph:ICONS.shield_glyph,label:'Aegis'},compass:{cls:'compass',glyph:ICONS.compass_glyph,label:'Compass'},oracle:{cls:'oracle',glyph:ICONS.oracle_glyph,label:'Oracle'},rewind:{cls:'rewind',glyph:ICONS.rewind_glyph,label:'Rewind'},lantern:{cls:'lantern',glyph:ICONS.lantern_glyph,label:'Lantern'},hex:{cls:'cursed',glyph:ICONS.hex_glyph,label:'Hex'},tithe:{cls:'cursed',glyph:ICONS.tithe_glyph,label:'Tithe'},bargain:{cls:'cursed',glyph:ICONS.bargain_glyph,label:'Bargain'},scapegoat:{cls:'cursed',glyph:ICONS.scapegoat_glyph,label:'Scapegoat'},pyre:{cls:'cursed',glyph:ICONS.pyre_glyph,label:'Pyre'},rift:{cls:'cursed',glyph:ICONS.rift_glyph,label:'Rift'}};
      powerupsHTML=g.powerups.map((p,i)=>{
        const m=PMAP[p]||PMAP.scan;
        return`<span class="powerup-badge ${m.cls}" data-powerup="${p}" data-idx="${i}"><span class="glyph">${m.glyph}</span>${m.label}</span>`;
      }).join('');
    }

    const timerPct=g.maxTime>0?(g.timeRemaining/g.maxTime*100):100;
    const isLow=g.timeRemaining<=15;

    const runesHTML=Array.from({length:g.totalDepths},(_,i)=>{
      const cls=i<g.level?'completed':i===g.level?'active':'';
      return`<div class="level-rune ${cls}">${ICONS.runes[i]}</div>`;
    }).join('');

    let modBarHTML='';
    const cls=classById(g.gameClass);
    const showClassBadge=g.gameClass!=='sweeper';
    const badges=[];
    if(showClassBadge)badges.push(`<span class="class-badge" title="${cls.desc}"><span class="cb-icon">${cls.icon}</span>${cls.name}</span>`);
    if(g.modifiers.length>0)badges.push(...g.modifiers.map(m=>`<span class="modifier-badge" title="${m.desc}"><span class="mg">${m.icon}</span>${m.name}</span>`));
    if(badges.length>0)modBarHTML=`<div class="modifier-bar">${badges.join('')}</div>`;

    this.root.innerHTML=`
      <div class="status-bar">
        <div class="status-item"><span class="status-label">Depth</span><span class="status-value accent">${String(g.level+1).padStart(2,'0')}</span></div>
        <div class="status-item"><span class="status-label">Shards</span><span class="status-value accent" id="shard-val">${g.shards}</span></div>
        <div class="status-item"><span class="status-label">Time</span><span class="status-value ${isLow?'danger-text':'accent'}" id="timer-val">${this.fmtTime(g.timeRemaining)}</span></div>
        <div class="status-item"><span class="status-label">Buried</span><span class="status-value" id="mines-val">${g.mineCount-g.flagCount}</span></div>
      </div>
      <div class="level-bar">${runesHTML}</div>
      ${modBarHTML}
      <div class="timer-bar-wrap"><div class="timer-bar ${isLow?'low':''}" id="timer-bar" style="width:${timerPct}%"></div></div>
      <div class="powerup-bar" id="powerup-bar">${powerupsHTML}</div>
      <div class="grid" id="grid" role="grid" aria-label="Minesweeper board" style="grid-template-columns:repeat(${g.cols},${cellSize}px);gap:1px;padding:4px;"></div>
      <div class="controls">
        <button class="btn btn-primary" id="btn-new">New Game</button>
        <button class="btn btn-secondary" id="btn-save">Save</button>
        <button class="btn btn-secondary" id="btn-load">Load</button>
      </div>`;

    this.container.classList.toggle('danger',isLow&&!g.gameOver);

    const grid=document.getElementById('grid');
    for(let r=0;r<g.rows;r++){
      for(let c=0;c<g.cols;c++){
        const cell=g.board[r][c];
        const el=document.createElement('div');
        el.style.width=cellSize+'px';el.style.height=cellSize+'px';
        el.style.fontSize=Math.max(cellSize*0.42,10)+'px';
        el.dataset.r=r;el.dataset.c=c;
        el.setAttribute('role','gridcell');
        el.tabIndex=0;
        this.applyCellClass(el,cell,r,c);
        grid.appendChild(el);
      }
    }

    grid.addEventListener('click',e=>this.handleClick(e));
    grid.addEventListener('contextmenu',e=>{e.preventDefault();this.handleRightClick(e);});
    let touchTimer=null,touchMoved=false;
    grid.addEventListener('touchstart',e=>{touchMoved=false;touchTimer=setTimeout(()=>{if(!touchMoved)this.handleRightClick(e);},400);},{passive:true});
    grid.addEventListener('touchmove',()=>{touchMoved=true;clearTimeout(touchTimer);},{passive:true});
    grid.addEventListener('touchend',()=>clearTimeout(touchTimer),{passive:true});

    document.getElementById('btn-new').addEventListener('click',()=>{sfx.init();this.game.reset();this.startLevel();});
    document.getElementById('btn-save').addEventListener('click',()=>this.saveGame());
    document.getElementById('btn-load').addEventListener('click',()=>this.loadGame());
    document.querySelectorAll('.powerup-badge').forEach(el=>{el.addEventListener('click',()=>this.usePowerup(el.dataset.powerup));});

  applyCellClass(el,cell,r,c){
    el.className='cell';
    const g=this.game;
    if(cell.revealed){
      if(cell.mine){
        el.classList.add('mine-hit');el.innerHTML=ICONS.skull;
        el.setAttribute('aria-label','Mine');
      }else{
        el.classList.add('revealed');
        const displayN=g.displayAdjacent(cell);
        let shown='';
        if(displayN>0){
          const isCryptic=g.hasModifier('cryptic')&&displayN>=4;
          const val=isCryptic?'?':displayN;
          const color=isCryptic?'var(--text-muted)':NUM_COLORS[displayN];
          shown=`<span class="num-display" style="color:${color};text-shadow:0 0 6px ${color}33">${val}</span>`;
        }
        el.innerHTML=shown;
        el.setAttribute('aria-label',displayN>0?displayN+' adjacent':'Empty');
        if(g.hasModifier('echo')&&displayN>0)el.classList.add('echo-fade');
      }
    }else if(cell.flagged){
      el.classList.add('flagged');el.innerHTML=ICONS.stake;
      el.setAttribute('aria-label','Flagged');
    }else{
      el.classList.add('unrevealed');el.innerHTML='';
      el.setAttribute('aria-label','Unrevealed');
      if(g.hasModifier('fog')&&r!=null&&c!=null&&!g.isVisible(r,c)){
        el.classList.add('fogged');
        el.setAttribute('aria-label','Hidden in fog');
      }
    }
  }

  getCellEl(e){const el=e.target.closest('.cell');if(!el)return null;return{el,r:+el.dataset.r,c:+el.dataset.c};}

  handleClick(e){
    const t=this.getCellEl(e);if(!t||this.game.gameOver)return;
    sfx.init();
    const cell=this.game.board[t.r][t.c];
    if(this.game.hasModifier('fog')&&!cell.revealed&&!this.game.isVisible(t.r,t.c))return;
    const results=cell.revealed?this.game.chord(t.r,t.c):this.game.reveal(t.r,t.c);
    if(!results.length)return;
    if(this.game.consumeSurge())this.triggerSurge();

    if(results[0]?.shieldBlocked){
      sfx.shieldBlock();this.showToast('Aegis absorbed','var(--num-2)');this.setFlavor(NARRATOR.react('shieldBlock')||'');this.renderBoard();return;
    }
    if(results[0]?.scapegoatBlocked){
      sfx.shieldBlock();this.showToast('Scapegoat bleeds / time '+this.game.timeMultiplier+'x','var(--danger)');this.renderBoard();return;
    }
    if(results[0]?.mine){this.onMineHit(t.r,t.c);return;}

    sfx.reveal();
    const now=Date.now();
    const comboWindow=this.game.gameClass==='wraith'?1600:800;
    if(now-this.lastRevealTime<comboWindow){
      this.comboCount++;
      if(this.comboCount>=3){this.game.awardShards(Math.min(this.comboCount-2,5));this.showCombo(e.clientX,e.clientY,this.comboCount);}
      if(this.game.gameClass==='wraith'&&this.comboCount>=4){
        this.game.timeRemaining=Math.min(this.game.timeRemaining+1,this.game.maxTime+30);
        if(this.comboCount===4||this.comboCount%3===1)this.showToast('+1s banked','var(--accent)');
      }
      if(this.comboCount===4||this.comboCount===7){const line=NARRATOR.react('combo',{count:this.comboCount});if(line)this.setFlavor(line);}
      // Track max combo for class unlocks
      const prevMax=parseInt(localStorage.getItem('sweeper_maxCombo')||'0',10);
      if(this.comboCount>prevMax)localStorage.setItem('sweeper_maxCombo',String(this.comboCount));
    }else{this.comboCount=1;}
    this.lastRevealTime=now;

    this.renderBoard();
    results.forEach(({r,c})=>{
      const idx=r*this.game.cols+c;
      const cellEl=document.getElementById('grid')?.children[idx];
      if(cellEl)cellEl.classList.add('just-revealed');
    });

    if(this.game.gameWon){this.stopTimer();sfx.levelComplete();setTimeout(()=>this.showLevelComplete(),500);}
  }

  handleRightClick(e){
    const t=this.getCellEl(e);if(!t||this.game.gameOver)return;
    const cell=this.game.board[t.r][t.c];
    if(this.game.hasModifier('fog')&&!cell.revealed&&!this.game.isVisible(t.r,t.c))return;
    sfx.init();const was=cell.flagged;
    if(this.game.toggleFlag(t.r,t.c)){was?sfx.unflag():sfx.flag();this.renderBoard();}
  }

  triggerSurge(){
    this.container.classList.remove('surge-flash');void this.container.offsetWidth;
    this.container.classList.add('surge-flash');
    this.showToast('SURGE','var(--danger)');
    sfx.explosion();
    setTimeout(()=>this.container.classList.remove('surge-flash'),900);
  }

  onMineHit(r,c){
    sfx.explosion();
    this.wrapper.classList.remove('shake');void this.wrapper.offsetWidth;
    this.wrapper.classList.add('shake');
    setTimeout(()=>this.wrapper.classList.remove('shake'),400);

    for(let row=0;row<this.game.rows;row++)
      for(let col=0;col<this.game.cols;col++)
        if(this.game.board[row][col].mine)this.game.board[row][col].revealed=true;

    this.renderBoard();
    const idx=r*this.game.cols+c;
    const hitEl=document.getElementById('grid')?.children[idx];
    if(hitEl)hitEl.classList.add('mine-hit');

    this.setFlavor(NARRATOR.react('gameOver')||'');
    this.stopTimer();
    setTimeout(()=>this.showGameOver(),900);
  }

  showCombo(x,y,count){
    const el=document.createElement('div');
    el.className='combo';el.textContent=`x${count}`;
    el.style.fontSize=(14+count*2)+'px';
    el.style.left=x+'px';el.style.top=y+'px';
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),700);
  }

  showToast(msg,color){
    const el=document.createElement('div');
    el.className='toast-msg';el.textContent=msg;
    el.style.color=color||'var(--accent)';
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),1000);
  }

  showLevelComplete(){
    const g=this.game;
    const shardBonus=10*(g.level+1)+Math.floor(g.timeRemaining/5);
    const isLast=g.level>=g.totalDepths-1;
    const justUnlockedHard=isLast&&!g.hardMode&&localStorage.getItem('sweeper_hardUnlocked')!=='1';
    if(isLast&&!g.hardMode)localStorage.setItem('sweeper_hardUnlocked','1');
    const elapsed=this.levelStartTime?Math.floor((Date.now()-this.levelStartTime)/1000):60;
    const narratorLine=NARRATOR.react('levelComplete',{level:g.level,elapsed});
    this.setFlavor(narratorLine||'');

    // Preview next depth modifiers
    let nextModsHTML='';
    if(!isLast&&g.hardMode){
      const preview=rollModifiers(g.level+1);
      g._nextModifiers=preview;
      nextModsHTML=`<div class="modifier-preview-label">Next Depth</div>
        <div class="modifier-preview">
          ${preview.map(m=>`<div class="mp-item"><div class="mp-icon">${m.icon}</div><div class="mp-name">${m.name}</div><div class="mp-desc">${m.desc}</div></div>`).join('')}
        </div>`;
    }

    const shop=[
      {id:'timewarp',glyph:ICONS.time_glyph,name:'Hourglass',price:15},
      {id:'shield',glyph:ICONS.shield_glyph,name:'The Aegis',price:23},
      {id:'compass',glyph:ICONS.compass_glyph,name:'Compass',price:18},
      {id:'oracle',glyph:ICONS.oracle_glyph,name:'Oracle',price:21},
      {id:'scan',glyph:ICONS.scan_glyph,name:'The Eye',price:20},
      {id:'lantern',glyph:ICONS.lantern_glyph,name:'The Lantern',price:24},
    ];
    const cursedShop=[
      {id:'hex',glyph:ICONS.hex_glyph,name:'The Hex',price:20,cursed:true},
      {id:'bargain',glyph:ICONS.bargain_glyph,name:'Bargain',price:15,cursed:true},
      {id:'scapegoat',glyph:ICONS.scapegoat_glyph,name:'Scapegoat',price:23,cursed:true},
      {id:'pyre',glyph:ICONS.pyre_glyph,name:'The Pyre',price:24,cursed:true},
      {id:'rift',glyph:ICONS.rift_glyph,name:'The Rift',price:21,cursed:true},
    ];
    cursedShop.push({id:'tithe',glyph:ICONS.tithe_glyph,name:'Tithe',price:18,cursed:true});
    const items=[...shop];
    if(Math.random()<0.3){
      const cursed=cursedShop[Math.floor(Math.random()*cursedShop.length)];
      items.push(cursed);
    }

    const lastTitle=g.hardMode?'The Grid Falls':'The Grid Breaks';
    const lastFlavor=justUnlockedHard?'Hard Mode unlocked. The grid has more to show you.':(g.hardMode?'All five layers swept. The grid releases you.':'Four depths cleared.');

    let html=`<div class="modal-overlay" id="modal"><div class="modal level-complete">
      <h2>${isLast?lastTitle:'Depth '+(g.level+1)+' Cleared'}</h2>
      <div class="flavor">${isLast?lastFlavor:(FLAVORS.levelComplete[g.level]||'The grid yields')}</div>
      <div class="big-number">+${shardBonus}</div>
      <div class="big-label">Shards from the grid</div>`;

    if(!isLast){
      html+=nextModsHTML;
      const shopLine=NARRATOR.react('shopOpen',{shards:g.shards});
      html+=`<div class="shop-header">${shopLine||'SHOP'}</div>
        <div class="shop-shards" id="shop-shards">${g.shards} shards</div>
        <div class="shop-grid">
          ${items.map(p=>`<div class="shop-item ${p.cursed?'cursed':''} ${g.shards<p.price?'cant-afford':''}" data-pick="${p.id}" data-price="${p.price}" title="${p.name}">
            <span class="s-glyph">${p.glyph}</span>
            <div class="s-name">${p.name}</div>
            <div class="s-price">${p.price}&#9830;</div>
          </div>`).join('')}
        </div>
        <button class="btn btn-primary shop-descend" id="shop-descend">Descend</button>`;
    }else{
      html+=`<button class="btn btn-primary" id="modal-action">${justUnlockedHard?'Return':'Descend Again'}</button>`;
    }
    html+='</div></div>';
    document.body.insertAdjacentHTML('beforeend',html);

    if(isLast){
      document.getElementById('modal-action').addEventListener('click',()=>{
        document.getElementById('modal').remove();
        this.game.reset();
        if(justUnlockedHard){this.showStart();}else{this.startLevel();}
      });
    }else{
      const updateShop=()=>{
        const shardsEl=document.getElementById('shop-shards');
        if(shardsEl)shardsEl.textContent=g.shards+' shards';
        document.querySelectorAll('.shop-item').forEach(el=>{
          const price=+el.dataset.price;
          if(!el.classList.contains('bought')){
            el.classList.toggle('cant-afford',g.shards<price);
          }
        });
      };
      document.querySelectorAll('.shop-item').forEach(el=>{
        el.addEventListener('click',()=>{
          if(el.classList.contains('bought')||el.classList.contains('cant-afford'))return;
          const price=+el.dataset.price;
          if(g.shards<price)return;
          g.shards-=price;
          const pickId=el.dataset.pick;
          g.powerups.push(pickId);
          if(pickId==='scapegoat')g.scapegoatCharges+=2;
          el.classList.add('bought');
          sfx.powerup();
          if(el.closest('.shop-item')?.classList.contains('cursed')){const line=NARRATOR.react('boughtCursed');if(line)this.setFlavor(line);}
          else if(pickId==='shield'){const line=NARRATOR.react('boughtWard');if(line)this.setFlavor(line);}
          updateShop();
        });
      });
      document.getElementById('shop-descend').addEventListener('click',()=>{
        const carryTime=Math.floor(g.timeRemaining/2);
        g.level++;g.initLevel();
        // Use previewed modifiers if available (so descent matches what player saw)
        if(g._nextModifiers){g.modifiers=g._nextModifiers;g._nextModifiers=null;}
        g.timeRemaining+=carryTime;g.maxTime+=carryTime;
        document.getElementById('modal').remove();
        this.startLevel();
      });
    }
  }

  showGameOver(){
    sfx.gameOver();
    const g=this.game;
    document.body.insertAdjacentHTML('beforeend',`
      <div class="modal-overlay" id="modal"><div class="modal game-over">
        <h2>Swept</h2>
        <div class="flavor">${NARRATOR.react('gameOver')||''}</div>
        <div class="big-number">${g.shards}</div>
        <div class="big-label">Shards collected</div>
        <button class="btn btn-primary" id="modal-action">Begin Again</button>
      </div></div>`);
    document.getElementById('modal-action').addEventListener('click',()=>{document.getElementById('modal').remove();this.game.reset();this.startLevel();});
  }

  usePowerup(type){
    sfx.init();if(this.game.gameOver)return;
    if(type==='scan'){
      const results=this.game.useScan();
      if(results){sfx.powerup();this.showToast('3 SAFE REVEALED','var(--num-1)');this.renderBoard();
        results.forEach(({r,c})=>{const idx=r*this.game.cols+c;const el=document.getElementById('grid')?.children[idx];if(el)el.classList.add('just-revealed');});
        if(this.game.gameWon){this.stopTimer();sfx.levelComplete();setTimeout(()=>this.showLevelComplete(),400);}
      }
    }else if(type==='timewarp'){
      if(this.game.useTimeWarp()){sfx.powerup();this.showToast('+20s','var(--accent)');this.renderBoard();}
    }else if(type==='compass'){
      const flagged=this.game.useCompass();
      if(flagged){sfx.powerup();this.showToast(flagged+' staked','var(--num-4)');this.renderBoard();}
    }else if(type==='oracle'){
      const result=this.game.useOracle();
      if(result){sfx.powerup();this.showToast(result.revealed.length+' safe / '+result.flagged.length+' staked','var(--num-6)');this.renderBoard();
        result.revealed.forEach(({r,c})=>{const idx=r*this.game.cols+c;const el=document.getElementById('grid')?.children[idx];if(el)el.classList.add('just-revealed');});
        if(this.game.gameWon){this.stopTimer();sfx.levelComplete();setTimeout(()=>this.showLevelComplete(),400);}
      }
    }else if(type==='lantern'){
      const result=this.game.useLantern();
      if(result.status==='ok'&&result.revealed?.length){
        sfx.powerup();this.showToast('LANTERN LIT','#C8A878');this.renderBoard();
        result.revealed.forEach(({r,c})=>{const idx=r*this.game.cols+c;const el=document.getElementById('grid')?.children[idx];if(el)el.classList.add('just-revealed');});
        if(this.game.gameWon){this.stopTimer();sfx.levelComplete();setTimeout(()=>this.showLevelComplete(),400);}
      }else{this.showToast('NO GOOD STAKES','var(--text-dim)');}
    }else if(type==='hex'){
      const results=this.game.useHex();
      if(results){sfx.powerup();this.showToast('5 TILES / AEGIS HEXED','var(--danger)');this.renderBoard();
        results.forEach(({r,c})=>{const idx=r*this.game.cols+c;const el=document.getElementById('grid')?.children[idx];if(el)el.classList.add('just-revealed');});
        if(this.game.gameWon){this.stopTimer();sfx.levelComplete();setTimeout(()=>this.showLevelComplete(),400);}
      }
    }else if(type==='tithe'){
      const result=this.game.useTithe();
      if(result){sfx.powerup();this.showToast(result.added+' STAKED / '+result.removed+' WIPED','var(--danger)');this.renderBoard();}
    }else if(type==='bargain'){
      if(this.game.useBargain()){sfx.powerup();this.showToast('+40s / -50% SHARDS 60s','var(--danger)');this.renderBoard();}
    }else if(type==='pyre'){
      const result=this.game.usePyre();
      if(result.status==='badFlag'){
        sfx.explosion();this.showToast('PYRE CONSUMES','var(--danger)');this.onMineHit(result.r,result.c);
      }else if(result.status==='ok'&&result.revealed?.length){
        sfx.powerup();this.showToast('PYRE BURNS','var(--danger)');this.renderBoard();
        result.revealed.forEach(({r,c})=>{const idx=r*this.game.cols+c;const el=document.getElementById('grid')?.children[idx];if(el)el.classList.add('just-revealed');});
        if(this.game.gameWon){this.stopTimer();sfx.levelComplete();setTimeout(()=>this.showLevelComplete(),400);}
      }else{this.showToast('NO STAKES','var(--text-dim)');}
    }else if(type==='scapegoat'){
      this.showToast('Passive — '+this.game.scapegoatCharges+' charge'+(this.game.scapegoatCharges===1?'':'s'),'var(--danger)');
    }else if(type==='rift'){
      const result=this.game.useRift();
      if(result){sfx.powerup();this.showToast(result.revealed.length+' safe / '+result.flagged.length+' staked / -20s / +1 MINE','var(--danger)');this.renderBoard();
        result.revealed.forEach(({r,c})=>{const idx=r*this.game.cols+c;const el=document.getElementById('grid')?.children[idx];if(el)el.classList.add('just-revealed');});
        if(this.game.gameWon){this.stopTimer();sfx.levelComplete();setTimeout(()=>this.showLevelComplete(),400);}
        if(this.game.timeRemaining<=0){this.game.gameOver=true;this.game.gameWon=false;this.stopTimer();sfx.gameOver();setTimeout(()=>this.showGameOver(),600);}
      }
    }
    if(this.game.consumeSurge())this.triggerSurge();
  }

  startTimer(){
    this.stopTimer();
    this.timerLastTick=Date.now();
    this.timerInterval=setInterval(()=>{
      if(this.game.gameOver){this.stopTimer();return;}
      const now=Date.now();const elapsed=Math.floor((now-this.timerLastTick)/1000);
      if(elapsed<1)return;
      this.timerLastTick=now-(((now-this.timerLastTick)%1000));
      for(let i=0;i<elapsed;i++){this.game.tick();if(this.game.gameOver)break;}
      const tv=document.getElementById('timer-val');
      const tb=document.getElementById('timer-bar');
      const mv=document.getElementById('mines-val');
      const isLow=this.game.timeRemaining<=15;

      if(tv){tv.textContent=this.fmtTime(this.game.timeRemaining);tv.className=`status-value ${isLow?'danger-text':'accent'}`;if(isLow)sfx.tick();}
      if(tb){const pct=this.game.maxTime>0?(this.game.timeRemaining/this.game.maxTime*100):0;tb.style.width=pct+'%';tb.className=`timer-bar ${isLow?'low':''}`;}
      if(mv)mv.textContent=this.game.mineCount-this.game.flagCount;
      const shv=document.getElementById('shard-val');if(shv)shv.textContent=this.game.shards;

      this.container.classList.toggle('danger',isLow&&!this.game.gameOver);
      if(isLow&&!this.dangerFlavorShown){this.dangerFlavorShown=true;this.setFlavor(randomFlavor('danger'));}

      if(this.game.gameOver&&!this.game.gameWon){
        this.setFlavor(NARRATOR.react('gameOver')||'');
        this.stopTimer();sfx.gameOver();setTimeout(()=>this.showGameOver(),600);
      }
    },1000);
  }

  stopTimer(){if(this.timerInterval){clearInterval(this.timerInterval);this.timerInterval=null;}}
  fmtTime(s){const m=Math.floor(s/60);return`${String(m).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;}

  saveGame(){
    const s={level:this.game.level,shards:this.game.shards,timeRemaining:this.game.timeRemaining,maxTime:this.game.maxTime,
      rows:this.game.rows,cols:this.game.cols,mineCount:this.game.mineCount,revealedCount:this.game.revealedCount,
      firstClick:this.game.firstClick,powerups:[...this.game.powerups],
      hardMode:this.game.hardMode,totalDepths:this.game.totalDepths,gameClass:this.game.gameClass,
      modifiers:this.game.modifiers.map(m=>m.id),surged:this.game.surged,bargainCurseTime:this.game.bargainCurseTime,scapegoatCharges:this.game.scapegoatCharges,timeMultiplier:this.game.timeMultiplier,
      board:this.game.board.map(row=>row.map(c=>({mine:c.mine,revealed:c.revealed,flagged:c.flagged,adjacent:c.adjacent})))};
    localStorage.setItem('sweeper_save',JSON.stringify(s));
    this.showToast('Sealed','var(--accent)');
  }

  loadGame(){
    const raw=localStorage.getItem('sweeper_save');
    if(!raw){this.showToast('Nothing sealed','var(--danger)');return;}
    const s=JSON.parse(raw);const g=this.game;
    g.level=s.level;g.shards=s.shards||0;g.timeRemaining=s.timeRemaining;g.maxTime=s.maxTime;
    g.rows=s.rows;g.cols=s.cols;g.mineCount=s.mineCount;g.revealedCount=s.revealedCount;
    g.firstClick=s.firstClick;g.powerups=s.powerups||[];g.gameOver=false;g.gameWon=false;g.board=s.board;
    g.hardMode=!!s.hardMode;g.totalDepths=s.totalDepths||(g.hardMode?5:4);g.gameClass=s.gameClass||'sweeper';
    g.modifiers=(s.modifiers||[]).map(id=>MODIFIERS.find(m=>m.id===id)).filter(Boolean);
    g.surged=!!s.surged;g.bargainCurseTime=s.bargainCurseTime||0;g._fracShards=0;g.scapegoatCharges=s.scapegoatCharges||0;g.timeMultiplier=s.timeMultiplier||1;
    this.renderBoard();this.startTimer();this.showToast('Unsealed','var(--accent)');
  }
}

const ui=new GameUI();
</script>
